site_name: secdashboards
site_url: https://lexicone42.github.io/secdashboards
site_description: Security Data Lake Analytics for AWS Security Lake
repo_url: https://github.com/lexicone42/secdashboards
repo_name: lexicone42/secdashboards

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - API Reference:
      - api/index.md
      - Catalog: api/catalog.md
      - Connectors: api/connectors.md
      - Detections: api/detections.md
      - Graph: api/graph.md
      - Notifications: api/notifications.md
      - Reports: api/reports.md
      - AI / Bedrock: api/ai.md
      - Health: api/health.md
      - Adversary: api/adversary.md
      - Deploy: api/deploy.md
      - CLI: api/cli.md
  - Security: security.md
