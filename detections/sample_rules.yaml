# Sample Detection Rules for AWS Security Lake
# These rules query OCSF-formatted data from Security Lake

- id: detect-root-login
  name: Root Account Login Detected
  description: Detects when the root AWS account is used to sign in
  author: secdashboards
  severity: high
  tags:
    - authentication
    - root-account
    - aws
  mitre_attack:
    - T1078.004  # Valid Accounts: Cloud Accounts
  data_sources:
    - cloudtrail
  schedule: rate(5 minutes)
  threshold: 1
  query: |
    SELECT
        time_dt,
        actor.user.name as user_name,
        actor.user.type as user_type,
        src_endpoint.ip as source_ip,
        api.operation as operation,
        api.service.name as service,
        status
    FROM "{database}"."{table}"
    WHERE time_dt >= TIMESTAMP '{start_time}'
      AND time_dt < TIMESTAMP '{end_time}'
      AND actor.user.type = 'Root'
      AND class_uid = 3002
    ORDER BY time_dt DESC

- id: detect-iam-policy-changes
  name: IAM Policy Modification
  description: Detects changes to IAM policies which could indicate privilege escalation
  author: secdashboards
  severity: medium
  tags:
    - iam
    - policy-change
    - privilege-escalation
  mitre_attack:
    - T1098  # Account Manipulation
  data_sources:
    - cloudtrail
  schedule: rate(5 minutes)
  threshold: 1
  query: |
    SELECT
        time_dt,
        actor.user.name as user_name,
        api.operation as operation,
        api.request.data as request_data,
        src_endpoint.ip as source_ip,
        cloud.region as region
    FROM "{database}"."{table}"
    WHERE time_dt >= TIMESTAMP '{start_time}'
      AND time_dt < TIMESTAMP '{end_time}'
      AND api.service.name = 'iam.amazonaws.com'
      AND api.operation IN (
          'CreatePolicy',
          'DeletePolicy',
          'CreatePolicyVersion',
          'DeletePolicyVersion',
          'AttachUserPolicy',
          'DetachUserPolicy',
          'AttachRolePolicy',
          'DetachRolePolicy',
          'AttachGroupPolicy',
          'DetachGroupPolicy',
          'PutUserPolicy',
          'PutRolePolicy',
          'PutGroupPolicy'
      )
    ORDER BY time_dt DESC

- id: detect-security-group-changes
  name: Security Group Modification
  description: Detects changes to security groups that could expose resources
  author: secdashboards
  severity: medium
  tags:
    - network
    - security-group
    - exposure
  mitre_attack:
    - T1562.007  # Impair Defenses: Disable or Modify Cloud Firewall
  data_sources:
    - cloudtrail
  schedule: rate(5 minutes)
  threshold: 1
  query: |
    SELECT
        time_dt,
        actor.user.name as user_name,
        api.operation as operation,
        api.request.data as request_data,
        src_endpoint.ip as source_ip,
        cloud.region as region
    FROM "{database}"."{table}"
    WHERE time_dt >= TIMESTAMP '{start_time}'
      AND time_dt < TIMESTAMP '{end_time}'
      AND api.service.name = 'ec2.amazonaws.com'
      AND api.operation IN (
          'AuthorizeSecurityGroupIngress',
          'AuthorizeSecurityGroupEgress',
          'RevokeSecurityGroupIngress',
          'RevokeSecurityGroupEgress',
          'CreateSecurityGroup',
          'DeleteSecurityGroup'
      )
    ORDER BY time_dt DESC

- id: detect-unusual-api-calls
  name: Unusual API Call Volume
  description: Detects unusually high volume of API calls from a single user
  author: secdashboards
  severity: low
  tags:
    - anomaly
    - api-abuse
  mitre_attack:
    - T1106  # Native API
  data_sources:
    - cloudtrail
  schedule: rate(15 minutes)
  threshold: 100
  group_by:
    - actor.user.name
  query: |
    SELECT
        actor.user.name as user_name,
        COUNT(*) as api_call_count,
        COUNT(DISTINCT api.operation) as unique_operations,
        COUNT(DISTINCT api.service.name) as unique_services
    FROM "{database}"."{table}"
    WHERE time_dt >= TIMESTAMP '{start_time}'
      AND time_dt < TIMESTAMP '{end_time}'
    GROUP BY actor.user.name
    HAVING COUNT(*) > 100
    ORDER BY api_call_count DESC

- id: detect-failed-logins
  name: Multiple Failed Login Attempts
  description: Detects multiple failed authentication attempts
  author: secdashboards
  severity: medium
  tags:
    - authentication
    - brute-force
  mitre_attack:
    - T1110  # Brute Force
  data_sources:
    - cloudtrail
  schedule: rate(5 minutes)
  threshold: 5
  query: |
    SELECT
        actor.user.name as user_name,
        src_endpoint.ip as source_ip,
        COUNT(*) as failed_attempts,
        MIN(time_dt) as first_attempt,
        MAX(time_dt) as last_attempt
    FROM "{database}"."{table}"
    WHERE time_dt >= TIMESTAMP '{start_time}'
      AND time_dt < TIMESTAMP '{end_time}'
      AND class_uid = 3002
      AND status = 'Failure'
    GROUP BY actor.user.name, src_endpoint.ip
    HAVING COUNT(*) >= 5
    ORDER BY failed_attempts DESC

- id: detect-access-key-creation
  name: Access Key Created
  description: Detects creation of new IAM access keys
  author: secdashboards
  severity: medium
  tags:
    - iam
    - credentials
    - persistence
  mitre_attack:
    - T1098.001  # Account Manipulation: Additional Cloud Credentials
  data_sources:
    - cloudtrail
  schedule: rate(5 minutes)
  threshold: 1
  query: |
    SELECT
        time_dt,
        actor.user.name as created_by,
        api.request.data as request_data,
        src_endpoint.ip as source_ip,
        cloud.region as region
    FROM "{database}"."{table}"
    WHERE time_dt >= TIMESTAMP '{start_time}'
      AND time_dt < TIMESTAMP '{end_time}'
      AND api.operation = 'CreateAccessKey'
    ORDER BY time_dt DESC
