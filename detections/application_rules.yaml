# Application Log Detection Rules
# These rules query CloudWatch Logs Insights for Lambda, EKS, ALB, and Cloudflare logs

# =============================================================================
# Lambda Function Detection Rules
# =============================================================================

- id: detect-lambda-errors
  name: Lambda Function Errors
  description: Detects Lambda invocation errors, exceptions, and timeouts
  author: secdashboards
  severity: medium
  tags:
    - lambda
    - application
    - errors
  mitre_attack:
    - T1499  # Endpoint Denial of Service
  data_sources:
    - lambda-app-logs
  schedule: rate(5 minutes)
  threshold: 10
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, @logStream, @requestId
    | filter @message like /ERROR|Exception|Traceback|Task timed out/
    | stats count(*) as error_count by @logStream
    | filter error_count > 10
    | sort error_count desc

- id: detect-lambda-cold-starts
  name: Excessive Lambda Cold Starts
  description: Detects functions with high cold start rates indicating provisioning issues
  author: secdashboards
  severity: low
  tags:
    - lambda
    - performance
    - cold-start
  data_sources:
    - lambda-app-logs
  schedule: rate(15 minutes)
  threshold: 50
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, @logStream
    | filter @message like /INIT_START/
    | stats count(*) as cold_starts by @logStream, bin(1h)
    | filter cold_starts > 50
    | sort cold_starts desc

- id: detect-lambda-memory-exhaustion
  name: Lambda Memory Exhaustion
  description: Detects Lambda functions approaching memory limits
  author: secdashboards
  severity: high
  tags:
    - lambda
    - performance
    - memory
  mitre_attack:
    - T1499.004  # Application or System Exploitation
  data_sources:
    - lambda-app-logs
  schedule: rate(5 minutes)
  threshold: 1
  log_type: cloudwatch_logs
  query: |
    filter @type = "REPORT"
    | fields @requestId, @maxMemoryUsed, @memorySize
    | filter @maxMemoryUsed / @memorySize > 0.9
    | stats count(*) as high_memory_count, avg(@maxMemoryUsed / @memorySize * 100) as avg_memory_pct by @logStream
    | filter high_memory_count > 5
    | sort avg_memory_pct desc

- id: detect-lambda-duration-anomaly
  name: Lambda Duration Anomaly
  description: Detects Lambda executions taking unusually long
  author: secdashboards
  severity: medium
  tags:
    - lambda
    - performance
    - anomaly
  data_sources:
    - lambda-app-logs
  schedule: rate(10 minutes)
  threshold: 1
  log_type: cloudwatch_logs
  query: |
    filter @type = "REPORT"
    | stats avg(@duration) as avg_duration, max(@duration) as max_duration, stddev(@duration) as std_duration by @logStream
    | filter max_duration > avg_duration + (3 * std_duration)
    | sort max_duration desc

# =============================================================================
# EKS / Kubernetes Detection Rules
# =============================================================================

- id: detect-eks-pod-crashes
  name: EKS Pod Crash Loop
  description: Detects pods entering crash loop backoff state
  author: secdashboards
  severity: high
  tags:
    - eks
    - kubernetes
    - crash
  mitre_attack:
    - T1499  # Endpoint Denial of Service
  data_sources:
    - eks-container-logs
  schedule: rate(5 minutes)
  threshold: 3
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, kubernetes.pod_name, kubernetes.namespace_name
    | filter @message like /CrashLoopBackOff|Error|OOMKilled/
    | stats count(*) as crash_count by kubernetes.pod_name, kubernetes.namespace_name
    | filter crash_count >= 3
    | sort crash_count desc

- id: detect-eks-oom-killed
  name: EKS OOM Killed Containers
  description: Detects containers killed due to out-of-memory conditions
  author: secdashboards
  severity: high
  tags:
    - eks
    - kubernetes
    - memory
    - oom
  mitre_attack:
    - T1499.004  # Application or System Exploitation
  data_sources:
    - eks-container-logs
  schedule: rate(5 minutes)
  threshold: 1
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, kubernetes.pod_name, kubernetes.namespace_name
    | filter @message like /OOMKilled|oom-kill|Out of memory/
    | stats count(*) as oom_count by kubernetes.pod_name, kubernetes.namespace_name
    | sort oom_count desc

- id: detect-eks-failed-probes
  name: EKS Failed Health Probes
  description: Detects excessive liveness/readiness probe failures
  author: secdashboards
  severity: medium
  tags:
    - eks
    - kubernetes
    - health
  data_sources:
    - eks-container-logs
  schedule: rate(10 minutes)
  threshold: 10
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, kubernetes.pod_name
    | filter @message like /Liveness probe failed|Readiness probe failed|probe.*failed/
    | stats count(*) as probe_failures by kubernetes.pod_name
    | filter probe_failures > 10
    | sort probe_failures desc

- id: detect-eks-privilege-escalation
  name: EKS Privilege Escalation Attempt
  description: Detects potential privilege escalation in Kubernetes
  author: secdashboards
  severity: critical
  tags:
    - eks
    - kubernetes
    - security
    - privilege-escalation
  mitre_attack:
    - T1611  # Escape to Host
    - T1548  # Abuse Elevation Control Mechanism
  data_sources:
    - eks-container-logs
  schedule: rate(5 minutes)
  threshold: 1
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, kubernetes.pod_name, kubernetes.namespace_name
    | filter @message like /privileged.*true|hostPID.*true|hostNetwork.*true|capabilities.*SYS_ADMIN/
    | stats count(*) as priv_count by kubernetes.pod_name, kubernetes.namespace_name
    | sort priv_count desc

# =============================================================================
# ALB (Application Load Balancer) Detection Rules
# =============================================================================

- id: detect-alb-5xx-errors
  name: ALB Server Errors (5xx)
  description: Detects elevated 5xx error rates indicating backend issues
  author: secdashboards
  severity: high
  tags:
    - alb
    - network
    - errors
  mitre_attack:
    - T1499  # Endpoint Denial of Service
  data_sources:
    - alb-access-logs
  schedule: rate(5 minutes)
  threshold: 50
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, client_ip, elb_status_code, target_status_code, request
    | filter elb_status_code >= 500
    | stats count(*) as error_count by bin(5m)
    | filter error_count > 50
    | sort error_count desc

- id: detect-alb-suspicious-ips
  name: ALB Suspicious IP Activity
  description: Detects IPs with high error rates or unusual patterns
  author: secdashboards
  severity: medium
  tags:
    - alb
    - network
    - suspicious
  mitre_attack:
    - T1595  # Active Scanning
  data_sources:
    - alb-access-logs
  schedule: rate(10 minutes)
  threshold: 100
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, client_ip, elb_status_code, request
    | stats
        count(*) as total_requests,
        sum(elb_status_code >= 400 and elb_status_code < 500) as client_errors,
        sum(elb_status_code >= 500) as server_errors
      by client_ip
    | filter total_requests > 100 and (client_errors / total_requests > 0.5 or server_errors > 10)
    | sort client_errors desc

- id: detect-alb-slow-targets
  name: ALB Slow Backend Targets
  description: Detects backend targets with unusually high latency
  author: secdashboards
  severity: medium
  tags:
    - alb
    - performance
    - latency
  data_sources:
    - alb-access-logs
  schedule: rate(10 minutes)
  threshold: 1
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, target_ip, target_processing_time, request
    | filter target_processing_time > 5.0
    | stats
        count(*) as slow_requests,
        avg(target_processing_time) as avg_latency,
        max(target_processing_time) as max_latency
      by target_ip
    | filter slow_requests > 10
    | sort avg_latency desc

- id: detect-alb-auth-failures
  name: ALB Authentication Failures
  description: Detects elevated authentication failure rates
  author: secdashboards
  severity: medium
  tags:
    - alb
    - authentication
    - brute-force
  mitre_attack:
    - T1110  # Brute Force
  data_sources:
    - alb-access-logs
  schedule: rate(5 minutes)
  threshold: 20
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, client_ip, elb_status_code, request
    | filter elb_status_code = 401 or elb_status_code = 403
    | stats count(*) as auth_failures by client_ip
    | filter auth_failures > 20
    | sort auth_failures desc

# =============================================================================
# Cloudflare Detection Rules
# =============================================================================

- id: detect-cloudflare-waf-blocks
  name: Cloudflare WAF Blocks
  description: Detects IPs triggering WAF blocks indicating attack attempts
  author: secdashboards
  severity: high
  tags:
    - cloudflare
    - waf
    - attack
  mitre_attack:
    - T1190  # Exploit Public-Facing Application
  data_sources:
    - cloudflare-logs
  schedule: rate(5 minutes)
  threshold: 10
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, ClientIP, WAFAction, WAFRuleID, ClientRequestHost, ClientRequestURI
    | filter WAFAction = "block"
    | stats count(*) as block_count by ClientIP, WAFRuleID
    | filter block_count > 10
    | sort block_count desc

- id: detect-cloudflare-rate-limiting
  name: Cloudflare Rate Limiting Triggered
  description: Detects IPs hitting rate limits indicating potential abuse
  author: secdashboards
  severity: medium
  tags:
    - cloudflare
    - rate-limiting
    - abuse
  mitre_attack:
    - T1499.002  # Service Exhaustion Flood
  data_sources:
    - cloudflare-logs
  schedule: rate(5 minutes)
  threshold: 50
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, ClientIP, EdgeResponseStatus, ClientRequestHost
    | filter EdgeResponseStatus = 429
    | stats count(*) as rate_limited by ClientIP
    | filter rate_limited > 50
    | sort rate_limited desc

- id: detect-cloudflare-origin-errors
  name: Cloudflare Origin Server Errors
  description: Detects elevated error rates from origin servers
  author: secdashboards
  severity: high
  tags:
    - cloudflare
    - origin
    - errors
  data_sources:
    - cloudflare-logs
  schedule: rate(5 minutes)
  threshold: 100
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, OriginResponseStatus, ClientRequestHost, ClientRequestURI
    | filter OriginResponseStatus >= 500
    | stats count(*) as error_count by ClientRequestHost, bin(5m)
    | filter error_count > 100
    | sort error_count desc

- id: detect-cloudflare-bot-activity
  name: Cloudflare Suspicious Bot Activity
  description: Detects potential malicious bot traffic patterns
  author: secdashboards
  severity: medium
  tags:
    - cloudflare
    - bot
    - suspicious
  mitre_attack:
    - T1595  # Active Scanning
  data_sources:
    - cloudflare-logs
  schedule: rate(10 minutes)
  threshold: 1000
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, ClientIP, ClientRequestHost, ClientRequestURI
    | stats
        count(*) as request_count,
        count_distinct(ClientRequestURI) as unique_paths
      by ClientIP
    | filter request_count > 1000 and unique_paths / request_count < 0.1
    | sort request_count desc

- id: detect-cloudflare-challenge-failures
  name: Cloudflare Challenge Failures
  description: Detects IPs consistently failing Cloudflare challenges
  author: secdashboards
  severity: medium
  tags:
    - cloudflare
    - challenge
    - bot
  data_sources:
    - cloudflare-logs
  schedule: rate(10 minutes)
  threshold: 20
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, ClientIP, WAFAction, ClientRequestHost
    | filter WAFAction in ["challenge", "managed_challenge"]
    | stats count(*) as challenge_count by ClientIP
    | filter challenge_count > 20
    | sort challenge_count desc

# =============================================================================
# API Gateway Detection Rules
# =============================================================================

- id: detect-api-gateway-errors
  name: API Gateway Elevated Error Rate
  description: Detects elevated error rates on API Gateway endpoints
  author: secdashboards
  severity: medium
  tags:
    - api-gateway
    - api
    - errors
  data_sources:
    - api-gateway-logs
  schedule: rate(5 minutes)
  threshold: 50
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, status, ip, httpMethod, path
    | filter status >= 400
    | stats count(*) as error_count by path, status
    | filter error_count > 50
    | sort error_count desc

- id: detect-api-gateway-throttling
  name: API Gateway Throttling
  description: Detects clients being throttled by API Gateway
  author: secdashboards
  severity: medium
  tags:
    - api-gateway
    - throttling
    - rate-limit
  mitre_attack:
    - T1499.002  # Service Exhaustion Flood
  data_sources:
    - api-gateway-logs
  schedule: rate(5 minutes)
  threshold: 10
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, ip, path
    | filter status = 429
    | stats count(*) as throttle_count by ip
    | filter throttle_count > 10
    | sort throttle_count desc

- id: detect-api-gateway-unauthorized
  name: API Gateway Unauthorized Access Attempts
  description: Detects repeated unauthorized access attempts
  author: secdashboards
  severity: medium
  tags:
    - api-gateway
    - authentication
    - unauthorized
  mitre_attack:
    - T1110  # Brute Force
  data_sources:
    - api-gateway-logs
  schedule: rate(5 minutes)
  threshold: 20
  log_type: cloudwatch_logs
  query: |
    fields @timestamp, @message, ip, path, status
    | filter status = 401 or status = 403
    | stats count(*) as unauth_count by ip
    | filter unauth_count > 20
    | sort unauth_count desc
