AWSTemplateFormatVersion: '2010-09-09'
Description: Marimo Notebook Deployment on AWS App Runner with VPC Access

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID for App Runner VPC connector

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs for App Runner VPC connector

  ImageUri:
    Type: String
    Description: ECR image URI for Marimo container (e.g., 123456789.dkr.ecr.us-west-2.amazonaws.com/secdash-marimo:latest)

  AthenaDatabase:
    Type: String
    Default: amazon_security_lake_glue_db_us_west_2
    Description: Security Lake Athena database name

  AthenaOutputBucket:
    Type: String
    Description: S3 bucket for Athena query results

  NeptuneEndpoint:
    Type: String
    Description: Neptune cluster endpoint (optional - leave blank if not using Neptune)
    Default: ""

  NeptunePort:
    Type: String
    Default: "8182"
    Description: Neptune cluster port

  Cpu:
    Type: String
    Default: "1024"
    AllowedValues:
      - "256"
      - "512"
      - "1024"
      - "2048"
      - "4096"
    Description: CPU units for App Runner (1024 = 1 vCPU)

  Memory:
    Type: String
    Default: "2048"
    AllowedValues:
      - "512"
      - "1024"
      - "2048"
      - "3072"
      - "4096"
      - "6144"
      - "8192"
      - "10240"
      - "12288"
    Description: Memory in MB for App Runner

  HealthCheckPath:
    Type: String
    Default: "/"
    Description: Health check path for App Runner

  AutoScalingMinSize:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 25
    Description: Minimum number of instances

  AutoScalingMaxSize:
    Type: Number
    Default: 3
    MinValue: 1
    MaxValue: 25
    Description: Maximum number of instances

Conditions:
  HasNeptuneEndpoint: !Not [!Equals [!Ref NeptuneEndpoint, ""]]

Resources:
  # Security Group for App Runner VPC Connector
  AppRunnerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "secdash-apprunner-sg-${Environment}"
      GroupDescription: Security group for App Runner VPC connector
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS egress for AWS services
        - IpProtocol: tcp
          FromPort: 8182
          ToPort: 8182
          CidrIp: 0.0.0.0/0
          Description: Neptune access
      Tags:
        - Key: Name
          Value: !Sub "secdash-apprunner-sg-${Environment}"
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # VPC Connector for App Runner
  AppRunnerVpcConnector:
    Type: AWS::AppRunner::VpcConnector
    Properties:
      VpcConnectorName: !Sub "secdash-vpc-connector-${Environment}"
      Subnets: !Ref PrivateSubnetIds
      SecurityGroups:
        - !Ref AppRunnerSecurityGroup
      Tags:
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # IAM Role for App Runner Instance
  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "secdash-apprunner-instance-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AthenaQueryAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                  - athena:GetWorkGroup
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                  - s3:AbortMultipartUpload
                Resource:
                  - !Sub "arn:aws:s3:::${AthenaOutputBucket}"
                  - !Sub "arn:aws:s3:::${AthenaOutputBucket}/*"
        - PolicyName: GlueCatalogAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetTables
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetPartitions
                  - glue:GetPartition
                  - glue:BatchGetPartition
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/*"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/*"
        - PolicyName: SecurityLakeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - "arn:aws:s3:::aws-security-data-lake-*"
                  - "arn:aws:s3:::aws-security-data-lake-*/*"
        # Neptune Data Access - only granted if Neptune endpoint is provided
        # Note: neptune-db:* is scoped to the specific cluster via resource ARN
        # The neptunedata actions require specific Neptune cluster endpoint access
        - PolicyName: NeptuneDataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: NeptuneDBAccess
                Effect: Allow
                Action:
                  - neptune-db:connect
                  - neptune-db:ReadDataViaQuery
                  - neptune-db:WriteDataViaQuery
                  - neptune-db:GetQueryStatus
                  - neptune-db:CancelQuery
                # Resource is scoped to Neptune clusters in this account/region
                # For tighter scoping, import the Neptune cluster ARN from the Neptune stack
                Resource: !Sub "arn:aws:neptune-db:${AWS::Region}:${AWS::AccountId}:*/*"
              - Sid: NeptuneDataAPIAccess
                Effect: Allow
                Action:
                  - neptunedata:ExecuteGremlinQuery
                  - neptunedata:ExecuteOpenCypherQuery
                  - neptunedata:GetPropertygraphStatistics
                  - neptunedata:GetEngineStatus
                # Scoped to Neptune endpoints in this account/region
                Resource: !Sub "arn:aws:neptune-db:${AWS::Region}:${AWS::AccountId}:*"
      Tags:
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # IAM Role for App Runner Access (ECR pull)
  AppRunnerAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "secdash-apprunner-access-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess
      Tags:
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # Auto Scaling Configuration
  AppRunnerAutoScaling:
    Type: AWS::AppRunner::AutoScalingConfiguration
    Properties:
      AutoScalingConfigurationName: !Sub "secdash-autoscaling-${Environment}"
      MaxConcurrency: 100
      MaxSize: !Ref AutoScalingMaxSize
      MinSize: !Ref AutoScalingMinSize
      Tags:
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # App Runner Service
  AppRunnerService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Sub "secdash-marimo-${Environment}"
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt AppRunnerAccessRole.Arn
        AutoDeploymentsEnabled: true
        ImageRepository:
          ImageIdentifier: !Ref ImageUri
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: "8080"
            RuntimeEnvironmentVariables:
              - Name: ENVIRONMENT
                Value: !Ref Environment
              - Name: AWS_REGION
                Value: !Ref AWS::Region
              - Name: ATHENA_DATABASE
                Value: !Ref AthenaDatabase
              - Name: ATHENA_OUTPUT_LOCATION
                Value: !Sub "s3://${AthenaOutputBucket}/query-results/"
              - Name: NEPTUNE_ENDPOINT
                Value: !If [HasNeptuneEndpoint, !Ref NeptuneEndpoint, ""]
              - Name: NEPTUNE_PORT
                Value: !Ref NeptunePort
      InstanceConfiguration:
        Cpu: !Ref Cpu
        Memory: !Ref Memory
        InstanceRoleArn: !GetAtt AppRunnerInstanceRole.Arn
      NetworkConfiguration:
        EgressConfiguration:
          EgressType: VPC
          VpcConnectorArn: !Ref AppRunnerVpcConnector
        IngressConfiguration:
          IsPubliclyAccessible: false
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: !Ref HealthCheckPath
        Interval: 20
        Timeout: 5
        HealthyThreshold: 1
        UnhealthyThreshold: 5
      AutoScalingConfigurationArn: !Ref AppRunnerAutoScaling
      ObservabilityConfiguration:
        ObservabilityEnabled: true
        ObservabilityConfigurationArn: !Ref AppRunnerObservability
      Tags:
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # Observability Configuration
  AppRunnerObservability:
    Type: AWS::AppRunner::ObservabilityConfiguration
    Properties:
      ObservabilityConfigurationName: !Sub "secdash-observability-${Environment}"
      TraceConfiguration:
        Vendor: AWSXRAY
      Tags:
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # VPC Ingress Connection for private access
  VpcIngressConnection:
    Type: AWS::AppRunner::VpcIngressConnection
    Properties:
      VpcIngressConnectionName: !Sub "secdash-vpc-ingress-${Environment}"
      ServiceArn: !GetAtt AppRunnerService.ServiceArn
      IngressVpcConfiguration:
        VpcId: !Ref VpcId
        VpcEndpointId: !Ref AppRunnerVpcEndpoint
      Tags:
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

  # VPC Endpoint for App Runner (private access)
  AppRunnerVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.apprunner.requests"
      VpcEndpointType: Interface
      SubnetIds: !Ref PrivateSubnetIds
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup
      PrivateDnsEnabled: false

  # Security Group for VPC Endpoint
  # Note: Ingress allows 0.0.0.0/0 because this SG is attached to interface endpoints
  # in private subnets. The VPC isolation provides the security boundary.
  # For stricter control, replace CidrIp with the VPC CIDR block.
  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "secdash-vpce-sg-${Environment}"
      GroupDescription: Security group for App Runner VPC endpoint
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS access to VPC endpoint (scoped by VPC isolation)
      Tags:
        - Key: Name
          Value: !Sub "secdash-vpce-sg-${Environment}"
        - Key: Application
          Value: secdashboards
        - Key: Environment
          Value: !Ref Environment

Outputs:
  AppRunnerServiceArn:
    Description: ARN of the App Runner service
    Value: !GetAtt AppRunnerService.ServiceArn
    Export:
      Name: !Sub "${AWS::StackName}-AppRunnerServiceArn"

  AppRunnerServiceUrl:
    Description: URL of the App Runner service (private access only)
    Value: !GetAtt AppRunnerService.ServiceUrl
    Export:
      Name: !Sub "${AWS::StackName}-AppRunnerServiceUrl"

  VpcIngressConnectionDomainName:
    Description: Private domain name for VPC ingress
    Value: !GetAtt VpcIngressConnection.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-VpcIngressDomainName"

  AppRunnerSecurityGroupId:
    Description: Security group ID for App Runner VPC connector
    Value: !Ref AppRunnerSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-AppRunnerSecurityGroupId"

  AppRunnerInstanceRoleArn:
    Description: ARN of the App Runner instance role
    Value: !GetAtt AppRunnerInstanceRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AppRunnerInstanceRoleArn"

  VpcConnectorArn:
    Description: ARN of the VPC connector
    Value: !GetAtt AppRunnerVpcConnector.VpcConnectorArn
    Export:
      Name: !Sub "${AWS::StackName}-VpcConnectorArn"
