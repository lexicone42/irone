AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Application Load Balancer with OIDC Authentication for Security Dashboards.
  Provides SSO integration via Okta, Azure AD, Google Workspace, or any OIDC provider.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues:
      - dev
      - staging
      - prod

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID (must match App Runner VPC)

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnet IDs for ALB (at least 2 AZs)

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Private subnet IDs for internal ALB (at least 2 AZs)

  # OIDC Configuration
  OidcIssuer:
    Type: String
    Description: |
      OIDC Issuer URL (e.g., https://accounts.google.com,
      https://login.microsoftonline.com/{tenant}/v2.0,
      https://your-domain.okta.com)

  OidcAuthorizationEndpoint:
    Type: String
    Description: OIDC Authorization Endpoint URL

  OidcTokenEndpoint:
    Type: String
    Description: OIDC Token Endpoint URL

  OidcUserInfoEndpoint:
    Type: String
    Description: OIDC UserInfo Endpoint URL

  OidcClientId:
    Type: String
    Description: OIDC Client ID from your identity provider
    NoEcho: true

  OidcClientSecretArn:
    Type: String
    Description: ARN of Secrets Manager secret containing OIDC client secret

  # Target Configuration
  AppRunnerServiceArn:
    Type: String
    Description: ARN of the App Runner service to protect (optional - use AppRunnerServiceUrl if ARN not available)
    Default: ""

  AppRunnerServiceUrl:
    Type: String
    Description: URL of the App Runner service (without https://, e.g., xxx.us-west-2.awsapprunner.com)

  # Certificate
  CertificateArn:
    Type: String
    Description: ACM Certificate ARN for HTTPS

  # Domain
  DomainName:
    Type: String
    Description: Custom domain name for the ALB (e.g., security.example.com)

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID for DNS record creation
    Default: ""

  # Security
  AllowedCIDRs:
    Type: CommaDelimitedList
    Description: Comma-separated list of CIDRs allowed to access (e.g., "10.0.0.0/8,192.168.0.0/16" for internal only)
    Default: "0.0.0.0/0"

  SessionTimeout:
    Type: Number
    Default: 28800
    MinValue: 60
    MaxValue: 604800
    Description: OIDC session timeout in seconds (default 8 hours)

  # Internal vs External
  Scheme:
    Type: String
    Default: internal
    AllowedValues:
      - internet-facing
      - internal
    Description: Whether ALB should be internet-facing or internal (VPC-only)

Conditions:
  IsInternetFacing: !Equals [!Ref Scheme, "internet-facing"]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, ""]]
  CreateDnsRecord: !And
    - !Condition HasHostedZone
    - !Condition IsInternetFacing

Resources:
  # ============================================================================
  # SECURITY GROUPS
  # ============================================================================

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "secdash-alb-sg-${Environment}"
      GroupDescription: Security group for SSO-protected ALB
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "secdash-alb-sg-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  # Ingress rules - one for each allowed CIDR
  ALBSecurityGroupIngressHTTPS:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Select [0, !Ref AllowedCIDRs]
      Description: HTTPS access from allowed CIDR

  ALBSecurityGroupEgress:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: 0.0.0.0/0
      Description: HTTPS to App Runner and OIDC provider

  # ============================================================================
  # APPLICATION LOAD BALANCER
  # ============================================================================

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "secdash-alb-${Environment}"
      Type: application
      Scheme: !Ref Scheme
      Subnets: !If
        - IsInternetFacing
        - !Ref PublicSubnetIds
        - !Ref PrivateSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "120"
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - Key: routing.http2.enabled
          Value: "true"
      Tags:
        - Key: Name
          Value: !Sub "secdash-alb-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  # ============================================================================
  # TARGET GROUP (App Runner)
  # ============================================================================

  AppRunnerTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "secdash-tg-${Environment}"
      TargetType: ip
      Protocol: HTTPS
      Port: 443
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTPS
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200-399"
      TargetGroupAttributes:
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: !Ref SessionTimeout
      Tags:
        - Key: Name
          Value: !Sub "secdash-tg-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  # ============================================================================
  # HTTPS LISTENER WITH OIDC AUTHENTICATION
  # ============================================================================

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        # Action 1: OIDC Authentication
        - Type: authenticate-oidc
          Order: 1
          AuthenticateOidcConfig:
            Issuer: !Ref OidcIssuer
            AuthorizationEndpoint: !Ref OidcAuthorizationEndpoint
            TokenEndpoint: !Ref OidcTokenEndpoint
            UserInfoEndpoint: !Ref OidcUserInfoEndpoint
            ClientId: !Ref OidcClientId
            ClientSecret: !Sub "{{resolve:secretsmanager:${OidcClientSecretArn}:SecretString}}"
            SessionTimeout: !Ref SessionTimeout
            Scope: "openid email profile"
            OnUnauthenticatedRequest: authenticate
            SessionCookieName: AWSELBAuthSessionCookie
        # Action 2: Forward to App Runner
        - Type: forward
          Order: 2
          TargetGroupArn: !Ref AppRunnerTargetGroup

  # ============================================================================
  # HTTP REDIRECT LISTENER (if internet-facing)
  # ============================================================================

  HTTPRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: IsInternetFacing
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  # ============================================================================
  # DNS RECORD (optional)
  # ============================================================================

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreateDnsRecord
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: true

  # ============================================================================
  # WAF WEB ACL (optional security enhancement)
  # ============================================================================

  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "secdash-waf-${Environment}"
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      Description: WAF rules for Security Dashboards protection
      Rules:
        # Rate limiting - prevent brute force
        - Name: RateLimitRule
          Priority: 1
          Statement:
            RateBasedStatement:
              Limit: 1000
              AggregateKeyType: IP
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitRule

        # AWS Managed Rules - Core Rule Set
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 2
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet

        # AWS Managed Rules - Known Bad Inputs
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesKnownBadInputsRuleSet

      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "secdash-waf-${Environment}"
      Tags:
        - Key: Name
          Value: !Sub "secdash-waf-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  WebACLAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref ApplicationLoadBalancer
      WebACLArn: !GetAtt WebACL.Arn

  # ============================================================================
  # CLOUDWATCH ALARMS
  # ============================================================================

  UnauthorizedAccessAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "secdash-unauthorized-access-${Environment}"
      AlarmDescription: Alert on high rate of 401/403 errors (potential auth issues)
      MetricName: HTTPCode_ELB_4XX_Count
      Namespace: AWS/ApplicationELB
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      TreatMissingData: notBreaching

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "secdash-high-latency-${Environment}"
      AlarmDescription: Alert on high response latency
      MetricName: TargetResponseTime
      Namespace: AWS/ApplicationELB
      Statistic: p95
      Period: 300
      EvaluationPeriods: 3
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      TreatMissingData: notBreaching

Outputs:
  LoadBalancerDNS:
    Description: ALB DNS name
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-ALBDNSName"

  LoadBalancerArn:
    Description: ALB ARN
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub "${AWS::StackName}-ALBArn"

  LoadBalancerUrl:
    Description: Full URL to access the protected application
    Value: !If
      - HasHostedZone
      - !Sub "https://${DomainName}"
      - !Sub "https://${ApplicationLoadBalancer.DNSName}"

  TargetGroupArn:
    Description: Target group ARN (register App Runner IPs here)
    Value: !Ref AppRunnerTargetGroup
    Export:
      Name: !Sub "${AWS::StackName}-TargetGroupArn"

  SecurityGroupId:
    Description: ALB Security Group ID
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-SecurityGroupId"

  WebACLArn:
    Description: WAF Web ACL ARN
    Value: !GetAtt WebACL.Arn
    Export:
      Name: !Sub "${AWS::StackName}-WebACLArn"

  OIDCProviderSetupInstructions:
    Description: Instructions for OIDC provider setup
    Value: |
      Configure your OIDC provider with:
      - Redirect URI: https://<your-domain>/oauth2/idpresponse
      - Allowed Callback URLs: https://<your-domain>/oauth2/idpresponse
      - Logout URL: https://<your-domain>/logout

      For Okta:
        1. Create a new Web Application
        2. Set sign-in redirect URI to the callback URL above
        3. Enable Authorization Code flow
        4. Copy Client ID and Client Secret to Secrets Manager

      For Azure AD:
        1. Register new application in Azure Portal
        2. Add Web platform with redirect URI
        3. Create client secret
        4. Use https://login.microsoftonline.com/{tenant}/v2.0 as issuer

      For Google Workspace:
        1. Create OAuth 2.0 credentials in Google Cloud Console
        2. Add authorized redirect URI
        3. Use https://accounts.google.com as issuer
