# cargo-deny configuration for iris-rs workspace
# Run: cd iris-rs && cargo deny check

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "CC0-1.0",   # tiny-keccak (transitive from iceberg → opendal)
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path deps don't carry versions — allow them
allow-wildcard-paths = true

# Transitive duplicates from iceberg + cedar dependency trees — can't eliminate
skip = [
    { crate = "darling@0.20", reason = "iceberg depends on derive_builder which uses darling 0.20" },
    { crate = "darling_core@0.20", reason = "transitive from darling 0.20" },
    { crate = "darling_macro@0.20", reason = "transitive from darling 0.20" },
]
# Additional duplicates that may appear from different rand versions
skip-tree = [
    { crate = "rand@0.8", reason = "l42-token-handler uses rand 0.8, some deps use 0.9" },
]

[advisories]
# Deny any crate with a known vulnerability (default behavior in v0.14+)
ignore = [
    "RUSTSEC-2024-0436",  # paste unmaintained — transitive from iceberg, no fix available
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-org = { github = ["lexicone42"] }
