# cargo-deny configuration for iris-rs workspace
# Run: cd iris-rs && cargo deny check

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path deps don't carry versions — allow them
allow-wildcard-paths = true

[advisories]
# Deny any crate with a known vulnerability (default behavior in v0.14+)
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-org = { github = ["lexicone42"] }
