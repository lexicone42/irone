{% extends "base.html" %}
{% block title %}New Detection Rule — iris{% endblock %}

{% block content %}
<h1>New Detection Rule</h1>

<div class="card">
    <form method="post" action="/detections/">
        <div style="margin-bottom: 0.75rem;">
            <label style="display: block; color: var(--text-secondary); margin-bottom: 0.25rem;">
                Rule Name
            </label>
            <input type="text" name="name" required style="width: 100%;"
                   placeholder="e.g. Unauthorized IAM API Calls">
        </div>

        <div style="margin-bottom: 0.75rem;">
            <label style="display: block; color: var(--text-secondary); margin-bottom: 0.25rem;">
                Description
            </label>
            <textarea name="description" rows="2" style="width: 100%;"
                      placeholder="What does this rule detect?"></textarea>
        </div>

        <div class="grid grid-3" style="margin-bottom: 0.75rem;">
            <div>
                <label style="display: block; color: var(--text-secondary); margin-bottom: 0.25rem;">
                    Severity
                </label>
                <select name="severity" style="width: 100%;">
                    {% for sev in severities %}
                    <option value="{{ sev.value }}" {% if sev.value == "medium" %}selected{% endif %}>
                        {{ sev.value }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display: block; color: var(--text-secondary); margin-bottom: 0.25rem;">
                    Threshold
                </label>
                <input type="number" name="threshold" value="1" min="1" style="width: 100%;">
            </div>
            <div>
                <label style="display: block; color: var(--text-secondary); margin-bottom: 0.25rem;">
                    Tags (comma-separated)
                </label>
                <input type="text" name="tags" style="width: 100%;"
                       placeholder="e.g. iam, unauthorized">
            </div>
        </div>

        <div style="margin-bottom: 0.75rem;">
            <label style="display: block; color: var(--text-secondary); margin-bottom: 0.25rem;">
                SQL Query Template
            </label>
            <textarea name="query_template" rows="8" required style="width: 100%; font-size: 0.8rem;"
                      placeholder="SELECT * FROM cloudtrail_logs WHERE ...&#10;Use {start_time} and {end_time} as time placeholders"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Create Rule</button>
        <a href="/detections/" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}
