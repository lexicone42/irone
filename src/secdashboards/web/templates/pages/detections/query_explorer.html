{% extends "base.html" %}
{% block title %}Query Explorer — iris{% endblock %}

{% block content %}
<h1>Query Explorer</h1>

<div class="card">
    <div class="card-header">SQL Query (DuckDB)</div>
    <form hx-post="/detections/query-explorer/run"
          hx-target="#query-results"
          hx-indicator="#query-spinner">
        <textarea name="sql" rows="6"
                  style="width: 100%; margin-bottom: 0.75rem; font-size: 0.8rem;"
                  placeholder="SELECT * FROM information_schema.tables;"></textarea>
        <button type="submit" class="btn btn-primary">Run Query</button>
        <span id="query-spinner" class="htmx-indicator">
            <span class="spinner"></span> Executing...
        </span>
    </form>
</div>

<div id="query-results"></div>
{% endblock %}
