{# AI result fragment — swapped in by HTMX #}
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% else %}
<div style="background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px; padding: 1rem;">
    <pre style="white-space: pre-wrap; font-size: 0.8rem; color: var(--text-primary);">{{ content }}</pre>
    {% if cost %}
    <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.75rem;">
        Cost: ${{ "%.4f" | format(cost) }}
    </p>
    {% endif %}
</div>
{% endif %}
