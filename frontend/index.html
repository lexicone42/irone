<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — irone</title>
    <link rel="stylesheet" href="/assets/terminal.css">
    <link rel="manifest" href="/assets/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/assets/auth.js"></script>
    <script src="/assets/app.js"></script>
</head>
<body>
    <div class="layout" x-data="navApp()">
        <nav class="sidebar">
            <div class="nav-brand">&gt; irone_</div>

            <div class="nav-section">Overview</div>
            <a href="/" class="nav-link" :class="isActive('/') && 'active'"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>

            <div class="nav-section">Operations</div>
            <a href="/monitoring.html" class="nav-link" :class="isActive('/monitoring') && 'active'"><i class="fa-solid fa-heart-pulse"></i> Health Monitor</a>
            <a href="/sources.html" class="nav-link" :class="isActive('/sources') && 'active'"><i class="fa-solid fa-database"></i> Sources</a>

            <div class="nav-section">Detection</div>
            <a href="/detections.html" class="nav-link" :class="isActive('/detections') && 'active'"><i class="fa-solid fa-shield-halved"></i> Rules &amp; Queries</a>

            <div class="nav-section">Investigation</div>
            <a href="/investigations.html" class="nav-link" :class="isActive('/investigations') && 'active'"><i class="fa-solid fa-magnifying-glass"></i> Investigations</a>

            <template x-if="authEnabled && userEmail">
                <div class="sidebar-footer">
                    <div class="sidebar-footer-email" x-text="userEmail"></div>
                    <a href="#" class="nav-link" @click.prevent="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
                </div>
            </template>
        </nav>

        <main class="main-content" x-data="dashboardApp()">
            <h1>Dashboard</h1>

            <template x-if="loading">
                <div class="text-center" style="padding: 2rem;">
                    <span class="spinner"></span> Loading...
                </div>
            </template>

            <template x-if="error">
                <div class="alert alert-error" x-text="error"></div>
            </template>

            <template x-if="!loading && data">
                <div>
                    <div class="grid grid-3">
                        <div class="card stat-card">
                            <div class="stat-label">Data Sources</div>
                            <div class="stat-value" x-text="data.source_count"></div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-label">Detection Rules</div>
                            <div class="stat-value" x-text="data.rule_count"></div>
                        </div>
                        <div class="card stat-card">
                            <div class="stat-label">Region</div>
                            <div class="stat-value-sm" x-text="data.region"></div>
                        </div>
                    </div>

                    <template x-if="data.health.available">
                        <div class="grid grid-3">
                            <div class="card stat-card">
                                <div class="stat-label">Sources Healthy</div>
                                <div class="stat-value status-ok" x-text="data.health.healthy"></div>
                            </div>
                            <div class="card stat-card">
                                <div class="stat-label">Sources Unhealthy</div>
                                <div class="stat-value" :class="data.health.unhealthy > 0 ? 'status-error' : 'status-ok'" x-text="data.health.unhealthy"></div>
                            </div>
                            <div class="card stat-card">
                                <div class="stat-label">Investigations</div>
                                <div class="stat-value" x-text="data.investigation_count"></div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </main>
    </div>
</body>
</html>
