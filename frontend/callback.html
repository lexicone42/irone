<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating — irone</title>
    <link rel="stylesheet" href="/assets/terminal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="/assets/auth.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div id="status">
                <span class="spinner"></span> Completing authentication...
            </div>
            <div id="error" style="display: none;" class="alert alert-error"></div>
        </div>
    </div>

    <script type="module">
        import { exchangeCodeForTokens } from '/assets/l42-auth.js';

        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const errorDesc = params.get('error_description');

        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');

        if (error) {
            statusEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = errorDesc || error;
            setTimeout(() => { window.location.href = '/login.html'; }, 3000);
        } else if (!code) {
            statusEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = 'Missing authorization code.';
            setTimeout(() => { window.location.href = '/login.html'; }, 2000);
        } else {
            // Initialize L42 config before exchanging code
            try {
                const resp = await fetch('/api/auth/config');
                const config = await resp.json();
                window.L42_AUTH_CONFIG = {
                    clientId: config.passkey_client_id || config.cognito_client_id,
                    domain: config.cognito_domain,
                    region: config.cognito_region,
                    redirectUri: window.location.origin + '/callback.html',
                    tokenEndpoint: '/auth/token',
                    refreshEndpoint: '/auth/refresh',
                    logoutEndpoint: '/auth/logout',
                    sessionEndpoint: '/auth/session',
                    scopes: ['openid', 'email', 'aws.cognito.signin.user.admin'],
                };
            } catch {
                // Config fetch failed — try exchange anyway
            }

            try {
                await exchangeCodeForTokens(code, state);
                statusEl.textContent = 'Success! Redirecting...';
                setTimeout(() => { window.location.href = '/'; }, 500);
            } catch (err) {
                statusEl.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent = 'Authentication failed: ' + err.message;
                setTimeout(() => { window.location.href = '/login.html'; }, 3000);
            }
        }
    </script>
</body>
</html>
