<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Rules — irone</title>
    <link rel="stylesheet" href="/assets/terminal.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/assets/auth.js"></script>
    <script src="/assets/app.js"></script>
</head>
<body>
    <div class="layout" x-data="navApp()">
        <nav class="sidebar">
            <div class="nav-brand">&gt; iris_</div>

            <div class="nav-section">Overview</div>
            <a href="/" class="nav-link" :class="isActive('/') && 'active'">Dashboard</a>

            <div class="nav-section">Operations</div>
            <a href="/monitoring.html" class="nav-link" :class="isActive('/monitoring') && 'active'">Health Monitor</a>
            <a href="/sources.html" class="nav-link" :class="isActive('/sources') && 'active'">Sources</a>

            <div class="nav-section">Detection</div>
            <a href="/detections.html" class="nav-link" :class="isActive('/detections') && 'active'">Rules & Queries</a>

            <div class="nav-section">Investigation</div>
            <a href="/investigations.html" class="nav-link" :class="isActive('/investigations') && 'active'">Investigations</a>

            <template x-if="authEnabled && userEmail">
                <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
                    <div style="color: var(--text-muted); font-size: 0.75rem; padding: 0.25rem 0.75rem;" x-text="userEmail"></div>
                    <a href="#" class="nav-link" @click.prevent="doLogout()">Sign Out</a>
                </div>
            </template>
        </nav>

        <main class="main-content" x-data="detectionsApp()">
            <h1>Detection Rules</h1>

            <!-- Rules Section -->
            <div class="card">
                <div class="card-header">
                    Registered Rules
                    <template x-if="!loading">
                        <span x-text="'(' + rules.length + ')'"></span>
                    </template>
                </div>

                <template x-if="loading">
                    <div style="text-align: center; padding: 1rem;">
                        <span class="spinner"></span> Loading rules...
                    </div>
                </template>

                <template x-if="error">
                    <div class="alert alert-error" x-text="error"></div>
                </template>

                <template x-if="!loading && rules.length === 0 && !error">
                    <p style="color: var(--text-muted);">No rules registered. Load rules from a rules directory.</p>
                </template>

                <template x-if="!loading && rules.length > 0">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Severity</th>
                                <th>Tags</th>
                                <th>Enabled</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="rule in rules" :key="rule.id">
                                <tr>
                                    <td>
                                        <div x-text="rule.name"></div>
                                        <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.15rem;"
                                             x-text="rule.description"></div>
                                    </td>
                                    <td>
                                        <span class="badge" :class="severityClass(rule.severity)"
                                              x-text="rule.severity"></span>
                                    </td>
                                    <td>
                                        <template x-for="tag in (rule.tags || [])" :key="tag">
                                            <span class="rule-tag" x-text="tag"></span>
                                        </template>
                                    </td>
                                    <td>
                                        <span :class="rule.enabled ? 'status-ok' : 'status-error'"
                                              x-text="rule.enabled ? 'yes' : 'no'"></span>
                                    </td>
                                    <td>
                                        <button class="btn" style="padding: 0.2rem 0.6rem; font-size: 0.75rem;"
                                                @click="runDetection(rule.id)"
                                                :disabled="runningRule === rule.id">
                                            <template x-if="runningRule === rule.id">
                                                <span><span class="spinner"></span></span>
                                            </template>
                                            <template x-if="runningRule !== rule.id">
                                                <span>Run</span>
                                            </template>
                                        </button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>
            </div>

            <!-- Detection Result Panel -->
            <template x-if="detectionResult">
                <div class="card" :class="detectionResult.triggered ? 'card-triggered' : ''">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <span>
                            Detection Result: <span x-text="detectionResult.rule_name" style="color: var(--text-primary);"></span>
                        </span>
                        <button class="btn" style="padding: 0.1rem 0.4rem; font-size: 0.7rem;"
                                @click="dismissResult()">Dismiss</button>
                    </div>

                    <!-- Status badge row -->
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                        <template x-if="detectionResult.triggered">
                            <span class="badge badge-error" style="font-size: 0.85rem; padding: 0.25rem 0.75rem;">TRIGGERED</span>
                        </template>
                        <template x-if="!detectionResult.triggered && !detectionResult.error">
                            <span class="badge badge-ok" style="font-size: 0.85rem; padding: 0.25rem 0.75rem;">CLEAN</span>
                        </template>
                        <template x-if="detectionResult.error">
                            <span class="badge badge-warn" style="font-size: 0.85rem; padding: 0.25rem 0.75rem;">ERROR</span>
                        </template>
                        <span style="color: var(--text-muted); font-size: 0.8rem;"
                              x-text="new Date(detectionResult.executed_at).toLocaleString()"></span>
                    </div>

                    <!-- Summary stats -->
                    <template x-if="!detectionResult.error">
                        <div class="grid grid-4" style="margin-bottom: 1rem;">
                            <div class="result-stat">
                                <div class="stat-label">Matches</div>
                                <div class="stat-value" style="font-size: 1.5rem;"
                                     :style="detectionResult.match_count > 0 ? 'color: var(--red)' : ''"
                                     x-text="detectionResult.match_count"></div>
                            </div>
                            <div class="result-stat">
                                <div class="stat-label">Severity</div>
                                <div style="font-size: 1.1rem; margin-top: 0.25rem;">
                                    <span class="badge" :class="severityClass(detectionResult.severity)"
                                          x-text="detectionResult.severity"></span>
                                </div>
                            </div>
                            <div class="result-stat">
                                <div class="stat-label">Exec Time</div>
                                <div style="font-size: 1rem; color: var(--cyan); margin-top: 0.25rem;"
                                     x-text="formatExecTime(detectionResult.execution_time_ms)"></div>
                            </div>
                            <div class="result-stat">
                                <div class="stat-label">Message</div>
                                <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;"
                                     x-text="detectionResult.message || '\u2014'"></div>
                            </div>
                        </div>
                    </template>

                    <!-- Error display -->
                    <template x-if="detectionResult.error">
                        <div class="alert alert-error" x-text="detectionResult.error"></div>
                    </template>

                    <!-- Sample matches table — curated OCSF fields -->
                    <template x-if="detectionResult.matches && detectionResult.matches.length > 0">
                        <div style="margin-bottom: 1rem;">
                            <div style="color: var(--text-secondary); font-size: 0.8rem; margin-bottom: 0.5rem;">
                                Sample Matches (showing <span x-text="Math.min(detectionResult.matches.length, 10)"></span>
                                of <span x-text="detectionResult.match_count"></span>)
                            </div>
                            <div style="overflow-x: auto; max-height: 350px; overflow-y: auto;">
                                <table class="data-table match-table">
                                    <thead>
                                        <tr>
                                            <th>Time</th>
                                            <th>Activity</th>
                                            <th>Actor</th>
                                            <th>Source IP</th>
                                            <th>Status</th>
                                            <th>Resources</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template x-for="(m, i) in detectionResult.matches.slice(0, 10)" :key="i">
                                            <tr>
                                                <td style="white-space: nowrap;" x-text="formatMatchTime(m.time_dt || m.time)"></td>
                                                <td>
                                                    <span style="color: var(--cyan);" x-text="extractNested(m, 'api.operation') || m.activity_name || '\u2014'"></span>
                                                    <template x-if="extractNested(m, 'api.service.name')">
                                                        <span style="color: var(--text-muted); font-size: 0.75rem;"
                                                              x-text="' \u2014 ' + extractNested(m, 'api.service.name')"></span>
                                                    </template>
                                                </td>
                                                <td x-text="extractNested(m, 'actor.user.name') || extractNested(m, 'actor.session.uid') || '\u2014'"></td>
                                                <td style="font-family: var(--font-mono); font-size: 0.8rem;"
                                                    x-text="extractNested(m, 'src_endpoint.ip') || '\u2014'"></td>
                                                <td>
                                                    <span :class="m.status === 'Success' ? 'status-ok' : (m.status === 'Failure' ? 'status-error' : '')"
                                                          x-text="m.status || '\u2014'"></span>
                                                </td>
                                                <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                                                    x-text="extractResources(m) || '\u2014'"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>

                    <!-- Investigate button -->
                    <template x-if="detectionResult.triggered">
                        <button class="btn btn-primary" @click="investigate()" :disabled="investigating"
                                style="font-size: 0.9rem; padding: 0.5rem 1.25rem;">
                            <template x-if="!investigating"><span>Create Investigation</span></template>
                            <template x-if="investigating">
                                <span><span class="spinner"></span> Building graph...</span>
                            </template>
                        </button>
                    </template>
                </div>
            </template>
        </main>
    </div>
</body>
</html>
