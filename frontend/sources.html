<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sources — iris</title>
    <link rel="stylesheet" href="/assets/terminal.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/assets/auth.js"></script>
    <script src="/assets/app.js"></script>
</head>
<body>
    <div class="layout" x-data="navApp()">
        <nav class="sidebar">
            <div class="nav-brand">&gt; iris_</div>

            <div class="nav-section">Overview</div>
            <a href="/" class="nav-link" :class="isActive('/') && 'active'">Dashboard</a>

            <div class="nav-section">Operations</div>
            <a href="/monitoring.html" class="nav-link" :class="isActive('/monitoring') && 'active'">Health Monitor</a>
            <a href="/sources.html" class="nav-link" :class="isActive('/sources') && 'active'">Sources</a>

            <div class="nav-section">Detection</div>
            <a href="/detections.html" class="nav-link" :class="isActive('/detections') && 'active'">Rules & Queries</a>

            <div class="nav-section">Investigation</div>
            <a href="/investigations.html" class="nav-link" :class="isActive('/investigations') && 'active'">Investigations</a>

            <template x-if="authEnabled && userEmail">
                <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
                    <div style="color: var(--text-muted); font-size: 0.75rem; padding: 0.25rem 0.75rem;" x-text="userEmail"></div>
                    <a href="#" class="nav-link" @click.prevent="doLogout()">Sign Out</a>
                </div>
            </template>
        </nav>

        <main class="main-content" x-data="sourcesApp()">
            <h1>Data Sources</h1>

            <template x-if="loading">
                <div style="text-align: center; padding: 2rem;">
                    <span class="spinner"></span> Loading sources...
                </div>
            </template>

            <template x-if="error">
                <div class="alert alert-error" x-text="error"></div>
            </template>

            <template x-if="!loading && sources.length > 0">
                <div class="card">
                    <div class="card-header">
                        Registered Sources (<span x-text="sources.length"></span>)
                    </div>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Region</th>
                                <th>Tags</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="src in sources" :key="src.name">
                                <tr>
                                    <td>
                                        <div x-text="src.name"></div>
                                        <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.15rem;"
                                             x-text="src.description"></div>
                                    </td>
                                    <td><span class="badge badge-ok" x-text="src.source_type"></span></td>
                                    <td x-text="src.region"></td>
                                    <td>
                                        <template x-for="tag in (src.tags || [])" :key="tag">
                                            <span class="rule-tag" x-text="tag"></span>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </main>
    </div>
</body>
</html>
