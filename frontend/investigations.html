<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investigations — irone</title>
    <link rel="stylesheet" href="/assets/terminal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js"></script>
    <script src="/assets/auth.js"></script>
    <script src="/assets/app.js"></script>
</head>
<body>
    <div class="layout" x-data="navApp()">
        <nav class="sidebar">
            <div class="nav-brand">&gt; irone_</div>

            <div class="nav-section">Overview</div>
            <a href="/" class="nav-link" :class="isActive('/') && 'active'"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>

            <div class="nav-section">Operations</div>
            <a href="/monitoring.html" class="nav-link" :class="isActive('/monitoring') && 'active'"><i class="fa-solid fa-heart-pulse"></i> Health Monitor</a>
            <a href="/sources.html" class="nav-link" :class="isActive('/sources') && 'active'"><i class="fa-solid fa-database"></i> Sources</a>

            <div class="nav-section">Detection</div>
            <a href="/detections.html" class="nav-link" :class="isActive('/detections') && 'active'"><i class="fa-solid fa-shield-halved"></i> Rules &amp; Queries</a>

            <div class="nav-section">Investigation</div>
            <a href="/investigations.html" class="nav-link" :class="isActive('/investigations') && 'active'"><i class="fa-solid fa-magnifying-glass"></i> Investigations</a>

            <template x-if="authEnabled && userEmail">
                <div class="sidebar-footer">
                    <div class="sidebar-footer-email" x-text="userEmail"></div>
                    <a href="/settings.html" class="nav-link" :class="isActive('/settings') && 'active'"><i class="fa-solid fa-gear"></i> Settings</a>
                    <a href="#" class="nav-link" @click.prevent="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
                </div>
            </template>
        </nav>

        <main class="main-content" x-data="investigationsApp()">

            <!-- ─── List View ──────────────────────────────── -->
            <template x-if="!activeInv">
                <div>
                    <h1>Investigations</h1>

                    <template x-if="error">
                        <div class="alert alert-error" x-text="error"></div>
                    </template>

                    <!-- Create Form (tabbed) -->
                    <div class="card">
                        <div class="card-header">New Investigation</div>
                        <div class="tab-bar" style="margin-bottom: 0.75rem;">
                            <button class="tab-btn" :class="createTab === 'identifiers' && 'active'"
                                    @click="setCreateTab('identifiers')">
                                <i class="fa-solid fa-fingerprint"></i> From Identifiers
                            </button>
                            <button class="tab-btn" :class="createTab === 'detection' && 'active'"
                                    @click="setCreateTab('detection')">
                                <i class="fa-solid fa-shield-halved"></i> From Detection
                                <template x-if="triggeredRuns.length > 0">
                                    <span class="badge badge-error badge-sm" style="margin-left: 0.35rem;"
                                          x-text="triggeredRuns.length"></span>
                                </template>
                            </button>
                        </div>

                        <!-- Tab: From Identifiers -->
                        <div x-show="createTab === 'identifiers'">
                            <div class="form-grid mb-3">
                                <div>
                                    <label>Name</label>
                                    <input type="text" x-model="newName" placeholder="e.g. Suspicious login" class="w-full">
                                </div>
                                <div>
                                    <label>Users (comma-separated)</label>
                                    <input type="text" x-model="newUsers" placeholder="e.g. admin@example.com" class="w-full">
                                </div>
                                <div>
                                    <label>IPs (comma-separated)</label>
                                    <input type="text" x-model="newIps" placeholder="e.g. 198.51.100.1" class="w-full">
                                </div>
                                <div>
                                    <label>Data Source</label>
                                    <select x-model="newSourceName" class="w-full">
                                        <option value="">— none (empty graph) —</option>
                                        <template x-for="src in availableSources" :key="src.name">
                                            <option :value="src.name" x-text="src.name"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                            <button class="btn btn-primary" @click="create()" :disabled="creating">
                                <template x-if="!creating"><span>Create Investigation</span></template>
                                <template x-if="creating"><span><span class="spinner"></span> Creating...</span></template>
                            </button>
                        </div>

                        <!-- Tab: From Detection -->
                        <div x-show="createTab === 'detection'">
                            <template x-if="triggeredRuns.length === 0">
                                <p class="text-muted text-sm" style="padding: 0.5rem 0;">
                                    No triggered detection runs yet. Run detections from the
                                    <a href="/detections.html" class="text-accent">Rules &amp; Queries</a> page first.
                                </p>
                            </template>
                            <template x-if="triggeredRuns.length > 0">
                                <div>
                                    <div class="form-grid mb-3">
                                        <div style="grid-column: 1 / -1;">
                                            <label>Triggered Detection</label>
                                            <select x-model="selectedDetectionRunId" class="w-full">
                                                <option value="">— select a triggered run —</option>
                                                <template x-for="run in triggeredRuns" :key="run.run_id">
                                                    <option :value="run.run_id"
                                                            x-text="run.rule_name + ' — ' + run.match_count + ' matches (' + timeAgo(run.executed_at) + ')'"></option>
                                                </template>
                                            </select>
                                        </div>
                                        <div>
                                            <label>Data Source (optional override)</label>
                                            <select x-model="detectionSourceName" class="w-full">
                                                <option value="">— use rule default —</option>
                                                <template x-for="src in availableSources" :key="src.name">
                                                    <option :value="src.name" x-text="src.name"></option>
                                                </template>
                                            </select>
                                        </div>
                                    </div>
                                    <template x-if="selectedDetectionRun">
                                        <div class="detection-run-preview">
                                            <span class="badge badge-error" x-text="selectedDetectionRun.severity"></span>
                                            <span class="text-sm" x-text="selectedDetectionRun.rule_name"></span>
                                            <span class="text-muted text-xs">
                                                <span x-text="selectedDetectionRun.match_count"></span> matches &middot;
                                                <span x-text="selectedDetectionRun.execution_time_ms + 'ms'"></span>
                                            </span>
                                        </div>
                                    </template>
                                    <button class="btn btn-primary" @click="createFromDetection()"
                                            :disabled="creating || !selectedDetectionRunId">
                                        <template x-if="!creating"><span><i class="fa-solid fa-diagram-project"></i> Investigate Detection</span></template>
                                        <template x-if="creating"><span><span class="spinner"></span> Creating...</span></template>
                                    </button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- List -->
                    <template x-if="loading">
                        <div class="text-center" style="padding: 2rem;">
                            <span class="spinner"></span> Loading...
                        </div>
                    </template>

                    <template x-if="!loading && investigations.length === 0">
                        <div class="card">
                            <p class="text-muted">No investigations yet. Create one above.</p>
                        </div>
                    </template>

                    <template x-if="!loading && investigations.length > 0">
                        <div class="card">
                            <div class="card-header">
                                Active Investigations (<span x-text="investigations.length"></span>)
                            </div>
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Status</th>
                                        <th>Nodes</th>
                                        <th>Edges</th>
                                        <th>Created</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="inv in investigations" :key="inv.id">
                                        <tr class="clickable" @click="openDetail(inv.id)">
                                            <td x-text="inv.name"></td>
                                            <td>
                                                <span class="badge badge-sm"
                                                      :class="inv.status === 'active' ? 'badge-ok' : inv.status === 'closed' ? 'badge-muted' : 'badge-warn'"
                                                      x-text="inv.status"></span>
                                            </td>
                                            <td x-text="inv.node_count"></td>
                                            <td x-text="inv.edge_count"></td>
                                            <td x-text="timeAgo(inv.created_at)"></td>
                                            <td>
                                                <button class="btn btn-sm btn-danger"
                                                        @click.stop="deleteInv(inv.id)">Delete</button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </template>

            <!-- ─── Detail View ────────────────────────────── -->
            <template x-if="activeInv">
                <div>
                    <div class="detail-header">
                        <a href="#" @click.prevent="backToList()" class="back-link">&larr; Back</a>
                        <h1 x-text="activeInv.name"></h1>
                        <span class="badge badge-accent text-xs" x-text="'ID: ' + activeInv.id"></span>
                    </div>

                    <template x-if="error">
                        <div class="alert alert-error" x-text="error"></div>
                    </template>

                    <!-- Summary Cards -->
                    <template x-if="activeInv.graph_summary || activeInv.summary">
                        <div class="grid grid-4 mb-4">
                            <div class="card stat-card">
                                <div class="stat-label">Nodes</div>
                                <div class="stat-value" x-text="(activeInv.graph_summary || activeInv.summary).total_nodes"></div>
                            </div>
                            <div class="card stat-card">
                                <div class="stat-label">Edges</div>
                                <div class="stat-value" x-text="(activeInv.graph_summary || activeInv.summary).total_edges"></div>
                            </div>
                            <div class="card stat-card">
                                <div class="stat-label">Node Types</div>
                                <div class="stat-value" x-text="Object.keys((activeInv.graph_summary || activeInv.summary).nodes_by_type || {}).length"></div>
                            </div>
                            <div class="card stat-card">
                                <div class="stat-label">Created</div>
                                <div class="stat-value-sm" x-text="timeAgo(activeInv.created_at)"></div>
                            </div>
                        </div>
                    </template>

                    <!-- Tab Bar -->
                    <div class="tab-bar">
                        <button class="tab-btn"
                                :class="detailTab === 'graph' && 'active'"
                                @click="showTab('graph')">Graph</button>
                        <button class="tab-btn"
                                :class="detailTab === 'report' && 'active'"
                                @click="showTab('report')">Report</button>
                    </div>

                    <template x-if="detailLoading">
                        <div class="text-center" style="padding: 2rem;">
                            <span class="spinner"></span> Loading...
                        </div>
                    </template>

                    <!-- ─── Graph Tab (split view: graph + timeline) ── -->
                    <div x-show="detailTab === 'graph' && !detailLoading">
                        <div class="card" x-show="graphData">
                            <div class="card-header flex-between">
                                <span>Investigation Graph</span>
                                <span style="display: flex; align-items: center; gap: 0.75rem;">
                                    <button class="btn btn-sm"
                                            :class="showEventNodes ? 'btn-primary' : ''"
                                            @click="toggleEventNodes()"
                                            x-text="showEventNodes ? 'Hide Events' : 'Show Events (' + ((graphData?.summary?.nodes_by_type?.Event) || 0) + ')'">
                                    </button>
                                    <span class="text-muted text-sm">
                                        Click nodes to inspect. Scroll to zoom.
                                    </span>
                                </span>
                            </div>
                            <div id="cy-graph" class="graph-container"></div>

                            <!-- Legend -->
                            <div class="graph-legend">
                                <span class="graph-legend-item"><span class="graph-legend-dot legend-principal"></span> Principal</span>
                                <span class="graph-legend-item"><span class="graph-legend-dot shape-diamond legend-ip"></span> IP Address</span>
                                <span class="graph-legend-item"><span class="graph-legend-dot shape-square legend-resource"></span> Resource</span>
                                <span class="graph-legend-item"><span class="graph-legend-dot shape-triangle legend-api"></span> API Operation</span>
                                <span class="graph-legend-item"><span class="graph-legend-dot shape-star legend-finding"></span> Finding</span>
                                <span class="graph-legend-item"><span class="graph-legend-dot legend-event"></span> Event</span>
                                <span class="graph-legend-item graph-legend-sep">
                                    <span class="text-accent">&#8212;</span> Network Flow
                                </span>
                                <span class="graph-legend-item"><span class="text-muted">- -</span> DNS</span>
                            </div>
                        </div>

                        <!-- Selected Node/Edge Details -->
                        <template x-if="selectedNode">
                            <div class="card">
                                <div class="card-header">
                                    Node: <span x-text="selectedNode.label"></span>
                                    <span class="badge badge-ok ml-2" x-text="selectedNode.node_type"></span>
                                </div>
                                <table class="data-table">
                                    <tbody>
                                        <tr>
                                            <td class="text-muted">ID</td>
                                            <td class="mono-sm" x-text="selectedNode.id"></td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">Events</td>
                                            <td x-text="selectedNode.event_count"></td>
                                        </tr>
                                        <template x-if="selectedNode.first_seen">
                                            <tr>
                                                <td class="text-muted">First Seen</td>
                                                <td x-text="selectedNode.first_seen"></td>
                                            </tr>
                                        </template>
                                        <template x-if="selectedNode.last_seen">
                                            <tr>
                                                <td class="text-muted">Last Seen</td>
                                                <td x-text="selectedNode.last_seen"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>

                        <template x-if="selectedEdge">
                            <div class="card">
                                <div class="card-header">
                                    Edge: <span class="text-accent" x-text="selectedEdge.edge_type"></span>
                                </div>
                                <table class="data-table">
                                    <tbody>
                                        <tr>
                                            <td class="text-muted">Source</td>
                                            <td class="mono-sm" x-text="selectedEdge.source"></td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">Target</td>
                                            <td class="mono-sm" x-text="selectedEdge.target"></td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">Flow Records</td>
                                            <td x-text="selectedEdge.event_count"></td>
                                        </tr>
                                        <template x-if="selectedEdge.properties?.bytes_in != null">
                                            <tr>
                                                <td class="text-muted">Bytes In</td>
                                                <td x-text="Number(selectedEdge.properties.bytes_in).toLocaleString()"></td>
                                            </tr>
                                        </template>
                                        <template x-if="selectedEdge.properties?.bytes_out != null">
                                            <tr>
                                                <td class="text-muted">Bytes Out</td>
                                                <td x-text="Number(selectedEdge.properties.bytes_out).toLocaleString()"></td>
                                            </tr>
                                        </template>
                                        <template x-if="selectedEdge.properties?.dst_port">
                                            <tr>
                                                <td class="text-muted">Ports</td>
                                                <td x-text="Array.isArray(selectedEdge.properties.dst_port) ? selectedEdge.properties.dst_port.join(', ') : selectedEdge.properties.dst_port"></td>
                                            </tr>
                                        </template>
                                        <template x-if="selectedEdge.properties?.protocol">
                                            <tr>
                                                <td class="text-muted">Protocol</td>
                                                <td x-text="selectedEdge.properties.protocol"></td>
                                            </tr>
                                        </template>
                                        <template x-if="selectedEdge.first_seen">
                                            <tr>
                                                <td class="text-muted">First Seen</td>
                                                <td x-text="selectedEdge.first_seen"></td>
                                            </tr>
                                        </template>
                                        <template x-if="selectedEdge.last_seen">
                                            <tr>
                                                <td class="text-muted">Last Seen</td>
                                                <td x-text="selectedEdge.last_seen"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </template>

                        <!-- ─── Timeline Panel ────────────────────── -->
                        <div class="card" x-show="timelineData && timelineData.events && timelineData.events.length > 0">
                            <div class="card-header flex-between">
                                <span>Timeline</span>
                                <span class="text-muted text-sm" x-text="filteredTimeline().length + ' events'"></span>
                            </div>

                            <!-- Filter bar -->
                            <div class="timeline-filter-bar">
                                <button class="timeline-filter-btn"
                                        :class="timelineFilter === 'all' && 'active'"
                                        @click="setTimelineFilter('all')">All</button>
                                <button class="timeline-filter-btn"
                                        :class="timelineFilter === 'suspicious' && 'active'"
                                        @click="setTimelineFilter('suspicious')">Suspicious</button>
                                <button class="timeline-filter-btn"
                                        :class="timelineFilter === 'unreviewed' && 'active'"
                                        @click="setTimelineFilter('unreviewed')">Unreviewed</button>
                            </div>

                            <!-- Event list (new grid-based timeline) -->
                            <div class="timeline-panel">
                                <template x-for="(evt, idx) in filteredTimeline()" :key="evt.id">
                                    <div class="timeline-event"
                                         :class="selectedTimelineEvent?.id === evt.id ? 'selected' : ''"
                                         :data-timeline-id="evt.id"
                                         @click="selectTimelineEvent(evt)">
                                        <div class="timeline-time">
                                            <div class="timeline-time-clock" x-text="formatTimelineClock(evt.timestamp)"></div>
                                            <div class="timeline-time-date" x-text="formatTimelineDate(evt.timestamp)"></div>
                                        </div>
                                        <div class="timeline-dot-col">
                                            <div class="timeline-dot"
                                                 :class="'severity-' + (evt.tag || 'unreviewed')"></div>
                                            <div class="timeline-line" x-show="idx < filteredTimeline().length - 1"></div>
                                        </div>
                                        <div class="timeline-body">
                                            <div class="timeline-title" x-text="evt.title"></div>
                                            <div class="timeline-desc" x-show="evt.description" x-text="evt.description"></div>
                                        </div>
                                        <span class="timeline-tag"
                                              :style="'background:' + tagColor(evt.tag) + '22; color:' + tagColor(evt.tag)"
                                              x-text="evt.tag || 'unreviewed'"
                                              x-show="evt.tag && evt.tag !== 'unreviewed'"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <template x-if="timelineLoading">
                            <div class="text-center" style="padding: 1rem;">
                                <span class="spinner"></span> Loading timeline...
                            </div>
                        </template>
                    </div>

                    <!-- ─── Report Tab ────────────────────────── -->
                    <div x-show="detailTab === 'report' && !detailLoading">
                        <template x-if="reportLoading">
                            <div class="text-center" style="padding: 2rem;">
                                <span class="spinner"></span> Generating report...
                            </div>
                        </template>

                        <template x-if="!reportLoading && reportData">
                            <div>
                                <!-- Report Header -->
                                <div class="card">
                                    <div class="card-header">Investigation Report</div>
                                    <div class="flex-between text-sm text-muted mb-2">
                                        <span x-text="'Generated: ' + (reportData.generated_at || '—')"></span>
                                        <span x-text="'ID: ' + (reportData.investigation_id || '—')"></span>
                                    </div>
                                    <template x-if="reportData.executive_summary">
                                        <p class="mt-1" x-text="reportData.executive_summary"></p>
                                    </template>
                                </div>

                                <!-- Entity Stats -->
                                <div class="grid grid-4 mb-4">
                                    <div class="card stat-card">
                                        <div class="stat-label">Nodes</div>
                                        <div class="stat-value-sm" x-text="reportData.total_nodes"></div>
                                    </div>
                                    <div class="card stat-card">
                                        <div class="stat-label">Edges</div>
                                        <div class="stat-value-sm" x-text="reportData.total_edges"></div>
                                    </div>
                                    <div class="card stat-card">
                                        <div class="stat-label">Principals</div>
                                        <div class="stat-value-sm" x-text="(reportData.principals || []).length"></div>
                                    </div>
                                    <div class="card stat-card">
                                        <div class="stat-label">IPs</div>
                                        <div class="stat-value-sm" x-text="(reportData.ip_addresses || []).length"></div>
                                    </div>
                                </div>

                                <!-- Entity Summaries -->
                                <template x-if="reportData.entity_summaries && reportData.entity_summaries.length > 0">
                                    <div class="card">
                                        <div class="card-header">Entity Breakdown</div>
                                        <table class="data-table">
                                            <thead>
                                                <tr>
                                                    <th>Type</th>
                                                    <th>Count</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="(entity, i) in reportData.entity_summaries" :key="i">
                                                    <tr>
                                                        <td x-text="entity.type || entity.node_type || '—'"></td>
                                                        <td x-text="entity.count || '—'"></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </template>

                                <!-- Principals List -->
                                <template x-if="reportData.principals && reportData.principals.length > 0">
                                    <div class="card">
                                        <div class="card-header">Principals</div>
                                        <div class="flex flex-wrap gap-2">
                                            <template x-for="p in reportData.principals" :key="p">
                                                <span class="badge badge-error" x-text="p"></span>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- IP Addresses -->
                                <template x-if="reportData.ip_addresses && reportData.ip_addresses.length > 0">
                                    <div class="card">
                                        <div class="card-header">IP Addresses</div>
                                        <div class="flex flex-wrap gap-2">
                                            <template x-for="ip in reportData.ip_addresses" :key="ip">
                                                <span class="badge badge-accent" x-text="ip"></span>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- API Operations -->
                                <template x-if="reportData.api_operations && reportData.api_operations.length > 0">
                                    <div class="card">
                                        <div class="card-header">API Operations</div>
                                        <div class="flex flex-wrap gap-2">
                                            <template x-for="op in reportData.api_operations" :key="op">
                                                <span class="badge badge-ok" x-text="op"></span>
                                            </template>
                                        </div>
                                    </div>
                                </template>

                                <!-- Findings -->
                                <template x-if="reportData.findings && reportData.findings.length > 0">
                                    <div class="card">
                                        <div class="card-header">Security Findings</div>
                                        <template x-for="(finding, i) in reportData.findings" :key="i">
                                            <div class="alert alert-error mb-2">
                                                <strong x-text="finding.title || finding.rule_name || 'Finding'"></strong>
                                                <template x-if="finding.severity">
                                                    <span class="badge badge-error ml-2" x-text="finding.severity"></span>
                                                </template>
                                                <template x-if="finding.description">
                                                    <p class="text-sm mt-1" x-text="finding.description"></p>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Timeline Events -->
                                <template x-if="reportData.timeline_events && reportData.timeline_events.length > 0">
                                    <div class="card">
                                        <div class="card-header">
                                            Timeline Events (<span x-text="reportData.timeline_events.length"></span>)
                                        </div>
                                        <div class="scroll-container">
                                            <table class="data-table">
                                                <thead>
                                                    <tr>
                                                        <th>Time</th>
                                                        <th>Event</th>
                                                        <th>Tag</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <template x-for="(evt, i) in reportData.timeline_events" :key="i">
                                                        <tr>
                                                            <td class="no-wrap text-sm"
                                                                x-text="evt.timestamp || evt.time || '—'"></td>
                                                            <td class="text-sm"
                                                                x-text="evt.description || evt.label || '—'"></td>
                                                            <td>
                                                                <template x-if="evt.tag">
                                                                    <span class="badge badge-warn" x-text="evt.tag"></span>
                                                                </template>
                                                            </td>
                                                        </tr>
                                                    </template>
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </template>

                                <!-- Time Range -->
                                <template x-if="reportData.time_range_start || reportData.time_range_end">
                                    <div class="card">
                                        <div class="card-header">Time Range</div>
                                        <div class="text-secondary text-sm mono">
                                            <span x-text="reportData.time_range_start || '—'"></span>
                                            <span class="text-muted"> → </span>
                                            <span x-text="reportData.time_range_end || '—'"></span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </main>
    </div>
</body>
</html>
