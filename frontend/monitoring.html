<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Monitor — irone</title>
    <link rel="stylesheet" href="/assets/terminal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.csp.min.js"></script>
    <script src="/assets/auth.js"></script>
    <script src="/assets/app.js"></script>
</head>
<body>
    <div class="layout" x-data="navApp()">
        <nav class="sidebar">
            <div class="nav-brand">&gt; irone_</div>

            <div class="nav-section">Overview</div>
            <a href="/" class="nav-link" :class="isActive('/') && 'active'"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>

            <div class="nav-section">Operations</div>
            <a href="/monitoring.html" class="nav-link" :class="isActive('/monitoring') && 'active'"><i class="fa-solid fa-heart-pulse"></i> Health Monitor</a>
            <a href="/sources.html" class="nav-link" :class="isActive('/sources') && 'active'"><i class="fa-solid fa-database"></i> Sources</a>

            <div class="nav-section">Detection</div>
            <a href="/detections.html" class="nav-link" :class="isActive('/detections') && 'active'"><i class="fa-solid fa-shield-halved"></i> Rules &amp; Queries</a>

            <div class="nav-section">Investigation</div>
            <a href="/investigations.html" class="nav-link" :class="isActive('/investigations') && 'active'"><i class="fa-solid fa-magnifying-glass"></i> Investigations</a>

            <template x-if="authEnabled && userEmail">
                <div class="sidebar-footer">
                    <div class="sidebar-footer-email" x-text="userEmail"></div>
                    <a href="/settings.html" class="nav-link" :class="isActive('/settings') && 'active'"><i class="fa-solid fa-gear"></i> Settings</a>
                    <a href="#" class="nav-link" @click.prevent="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a>
                </div>
            </template>
        </nav>

        <main class="main-content" x-data="healthMonitor()">
            <h1>Health Monitor</h1>

            <div class="card">
                <div class="card-header flex-between">
                    <span>Source Health</span>
                    <span class="flex items-center gap-3">
                        <template x-if="lastChecked">
                            <span class="text-muted text-sm mr-4"
                                  x-text="'Last check: ' + timeAgo(lastChecked)"></span>
                        </template>
                        <button class="btn btn-primary" @click="refresh()" :disabled="refreshing">
                            <template x-if="!refreshing"><span>Run Health Checks</span></template>
                            <template x-if="refreshing"><span><span class="spinner"></span> Checking...</span></template>
                        </button>
                    </span>
                </div>

                <template x-if="error">
                    <div class="alert alert-error" x-text="error"></div>
                </template>

                <template x-if="loading">
                    <div class="text-center" style="padding: 1rem;">
                        <span class="spinner"></span> Loading cached health data...
                    </div>
                </template>

                <template x-if="!loading && sources.length === 0 && !error">
                    <p class="text-muted">
                        No health data cached yet. Click "Run Health Checks" to check all sources.
                    </p>
                </template>

                <template x-if="!loading && sources.length > 0">
                    <div>
                        <div class="grid grid-3 mb-4">
                            <div class="card stat-card">
                                <div class="stat-label">Total</div>
                                <div class="stat-value" x-text="sources.length"></div>
                            </div>
                            <div class="card stat-card">
                                <div class="stat-label">Healthy</div>
                                <div class="stat-value status-ok" x-text="healthyCount"></div>
                            </div>
                            <div class="card stat-card">
                                <div class="stat-label">Unhealthy</div>
                                <div class="stat-value" :class="unhealthyCount > 0 ? 'status-error' : 'status-ok'" x-text="unhealthyCount"></div>
                            </div>
                        </div>

                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Source</th>
                                    <th>Status</th>
                                    <th>Records</th>
                                    <th>Latency</th>
                                    <th>Data Age</th>
                                    <th>Error</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="s in sources" :key="s.source_name">
                                    <tr>
                                        <td x-text="s.source_name"></td>
                                        <td>
                                            <span class="badge"
                                                  :class="s.healthy ? 'badge-ok' : 'badge-error'"
                                                  x-text="s.healthy ? 'OK' : 'FAIL'"></span>
                                        </td>
                                        <td x-text="s.record_count"></td>
                                        <td x-text="formatLatency(s.latency_seconds)"></td>
                                        <td x-text="formatAge(s.data_age_minutes)"></td>
                                        <td class="text-danger" x-text="s.error || ''"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
