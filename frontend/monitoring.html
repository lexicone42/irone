<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Monitor — iris</title>
    <link rel="stylesheet" href="/assets/terminal.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/assets/auth.js"></script>
    <script src="/assets/app.js"></script>
</head>
<body>
    <div class="layout" x-data="navApp()">
        <nav class="sidebar">
            <div class="nav-brand">&gt; iris_</div>

            <div class="nav-section">Overview</div>
            <a href="/" class="nav-link" :class="isActive('/') && 'active'">Dashboard</a>

            <div class="nav-section">Operations</div>
            <a href="/monitoring.html" class="nav-link" :class="isActive('/monitoring') && 'active'">Health Monitor</a>
            <a href="/sources.html" class="nav-link" :class="isActive('/sources') && 'active'">Sources</a>

            <div class="nav-section">Detection</div>
            <a href="/detections.html" class="nav-link" :class="isActive('/detections') && 'active'">Rules & Queries</a>

            <div class="nav-section">Investigation</div>
            <a href="/investigations.html" class="nav-link" :class="isActive('/investigations') && 'active'">Investigations</a>

            <template x-if="authEnabled && userEmail">
                <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
                    <div style="color: var(--text-muted); font-size: 0.75rem; padding: 0.25rem 0.75rem;" x-text="userEmail"></div>
                    <a href="#" class="nav-link" @click.prevent="doLogout()">Sign Out</a>
                </div>
            </template>
        </nav>

        <main class="main-content" x-data="healthMonitor()">
            <h1>Health Monitor</h1>

            <div class="card">
                <div class="card-header">
                    Source Health
                    <span style="float: right;">
                        <template x-if="lastChecked">
                            <span style="color: var(--text-muted); font-size: 0.75rem; margin-right: 1rem;"
                                  x-text="'Last check: ' + timeAgo(lastChecked)"></span>
                        </template>
                        <button class="btn btn-primary" @click="refresh()" :disabled="refreshing">
                            <template x-if="!refreshing"><span>Run Health Checks</span></template>
                            <template x-if="refreshing"><span><span class="spinner"></span> Checking...</span></template>
                        </button>
                    </span>
                </div>

                <template x-if="error">
                    <div class="alert alert-error" x-text="error"></div>
                </template>

                <template x-if="loading">
                    <div style="text-align: center; padding: 1rem;">
                        <span class="spinner"></span> Loading cached health data...
                    </div>
                </template>

                <template x-if="!loading && sources.length === 0 && !error">
                    <p style="color: var(--text-muted);">
                        No health data cached yet. Click "Run Health Checks" to check all sources.
                    </p>
                </template>

                <template x-if="!loading && sources.length > 0">
                    <div>
                        <div class="grid grid-3" style="margin-bottom: 1rem;">
                            <div class="card" style="text-align: center;">
                                <div class="stat-label">Total</div>
                                <div class="stat-value" x-text="sources.length"></div>
                            </div>
                            <div class="card" style="text-align: center;">
                                <div class="stat-label">Healthy</div>
                                <div class="stat-value status-ok" x-text="healthyCount"></div>
                            </div>
                            <div class="card" style="text-align: center;">
                                <div class="stat-label">Unhealthy</div>
                                <div class="stat-value" :class="unhealthyCount > 0 ? 'status-error' : 'status-ok'" x-text="unhealthyCount"></div>
                            </div>
                        </div>

                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Source</th>
                                    <th>Status</th>
                                    <th>Records</th>
                                    <th>Latency</th>
                                    <th>Data Age</th>
                                    <th>Error</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template x-for="s in sources" :key="s.source_name">
                                    <tr>
                                        <td x-text="s.source_name"></td>
                                        <td>
                                            <span class="badge"
                                                  :class="s.healthy ? 'badge-ok' : 'badge-error'"
                                                  x-text="s.healthy ? 'OK' : 'FAIL'"></span>
                                        </td>
                                        <td x-text="s.record_count"></td>
                                        <td x-text="formatLatency(s.latency_seconds)"></td>
                                        <td x-text="formatAge(s.data_age_minutes)"></td>
                                        <td style="color: var(--red);" x-text="s.error || ''"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </main>
    </div>
</body>
</html>
