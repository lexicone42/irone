  #   connector_config:
  #     output_location: s3://my-athena-results/
  #     workgroup: primary
  #   tags:
  #     - custom
  #     - application

default_region: us-west-2

# =========================================================================
# ETL Configuration for Rolling CloudWatch Logs to Security Lake
# =========================================================================
# The log_etl module supports cost-effective batch exports from CloudWatch
# to S3, with OCSF transformation for Security Lake ingestion.
#
# Recommended architecture:
#   Hot Tier (0-7 days): CloudWatch Logs Insights (cloudwatch_logs sources)
#   Cold Tier (7+ days): Security Lake via S3 (security_lake sources)
#
# Export approach (avoid Firehose costs):
#   1. Use CloudWatchLogExporter.export_log_group() with EventBridge schedule
#   2. Transform exports to OCSF with LogETLPipeline
#   3. Upload to Security Lake custom source S3 location
#
# See: src/secdashboards/connectors/log_etl.py for implementation details
