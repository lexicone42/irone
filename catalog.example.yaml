# Example Data Catalog Configuration
# Copy this to catalog.yaml and customize for your environment

sources:
  # AWS Security Lake - CloudTrail Management Events
  - name: cloudtrail
    type: security_lake
    database: amazon_security_lake_glue_db_us_west_2
    table: amazon_security_lake_table_us_west_2_cloud_trail_mgmt_2_0
    region: us-west-2
    description: CloudTrail management events from Security Lake (OCSF format)
    tags:
      - security-lake
      - cloudtrail
      - ocsf
      - management-events
    expected_freshness_minutes: 60
    health_check_query: |
      SELECT COUNT(*) as cnt, MAX(time_dt) as latest_time
      FROM "amazon_security_lake_glue_db_us_west_2"."amazon_security_lake_table_us_west_2_cloud_trail_mgmt_2_0"
      WHERE time_dt >= CURRENT_TIMESTAMP - INTERVAL '1' HOUR

  # AWS Security Lake - VPC Flow Logs
  - name: vpc-flow
    type: security_lake
    database: amazon_security_lake_glue_db_us_west_2
    table: amazon_security_lake_table_us_west_2_vpc_flow_2_0
    region: us-west-2
    description: VPC Flow Logs from Security Lake (OCSF format)
    tags:
      - security-lake
      - vpc-flow
      - network
      - ocsf
    expected_freshness_minutes: 60

  # AWS Security Lake - Route53 DNS Logs
  - name: route53
    type: security_lake
    database: amazon_security_lake_glue_db_us_west_2
    table: amazon_security_lake_table_us_west_2_route53_2_0
    region: us-west-2
    description: Route53 DNS resolver logs from Security Lake
    tags:
      - security-lake
      - dns
      - network
      - ocsf
    expected_freshness_minutes: 60

  # AWS Security Lake - Security Hub Findings
  - name: security-hub
    type: security_lake
    database: amazon_security_lake_glue_db_us_west_2
    table: amazon_security_lake_table_us_west_2_sh_findings_2_0
    region: us-west-2
    description: Security Hub findings from Security Lake
    tags:
      - security-lake
      - security-hub
      - findings
      - ocsf
    expected_freshness_minutes: 120

  # AWS Security Lake - Lambda Execution Logs
  - name: lambda-execution
    type: security_lake
    database: amazon_security_lake_glue_db_us_west_2
    table: amazon_security_lake_table_us_west_2_lambda_2_0
    region: us-west-2
    description: Lambda execution logs from Security Lake (OCSF format)
    tags:
      - security-lake
      - lambda
      - application
      - ocsf
    expected_freshness_minutes: 60

  # =========================================================================
  # CloudWatch Logs Sources (Real-time / Hot Tier)
  # These query CloudWatch Logs Insights directly for recent data (0-7 days)
  # =========================================================================

  # Lambda Application Logs
  - name: lambda-app-logs
    type: cloudwatch_logs
    region: us-west-2
    description: Lambda function application logs from CloudWatch
    connector_config:
      source_type: lambda
      log_groups:
        - /aws/lambda/abstracts-api
        - /aws/lambda/abstracts-game-handler
        # Add more Lambda functions or use pattern: /aws/lambda/*
    tags:
      - cloudwatch
      - lambda
      - application
    expected_freshness_minutes: 15

  # EKS Container Logs
  - name: eks-container-logs
    type: cloudwatch_logs
    region: us-west-2
    description: EKS container logs from CloudWatch Container Insights
    connector_config:
      source_type: eks
      log_groups:
        - /aws/eks/my-cluster/containers
        - /aws/containerinsights/my-cluster/application
    tags:
      - cloudwatch
      - eks
      - kubernetes
      - containers
    expected_freshness_minutes: 15

  # Application Load Balancer Access Logs
  - name: alb-access-logs
    type: cloudwatch_logs
    region: us-west-2
    description: ALB access logs streamed to CloudWatch
    connector_config:
      source_type: alb
      log_groups:
        - /aws/alb/my-alb-access-logs
    tags:
      - cloudwatch
      - alb
      - network
      - access-logs
    expected_freshness_minutes: 15

  # API Gateway Access Logs
  - name: api-gateway-logs
    type: cloudwatch_logs
    region: us-west-2
    description: API Gateway execution and access logs
    connector_config:
      source_type: api_gateway
      log_groups:
        - /aws/apigateway/my-api
        - /aws/api-gateway/my-api-access-logs
    tags:
      - cloudwatch
      - api-gateway
      - api
    expected_freshness_minutes: 15

  # Cloudflare Logs (Streamed via Logpush to S3 → CloudWatch)
  - name: cloudflare-logs
    type: cloudwatch_logs
    region: us-west-2
    description: Cloudflare HTTP/WAF logs streamed to CloudWatch
    connector_config:
      source_type: cloudflare
      log_groups:
        - /cloudflare/http-requests
        - /cloudflare/firewall-events
    tags:
      - cloudwatch
      - cloudflare
      - waf
      - cdn
      - security
    expected_freshness_minutes: 30

  # =========================================================================
  # Custom Athena Data Source Example
  # For querying historical/cold tier data stored in S3
  # =========================================================================
  # - name: custom-logs
  #   type: athena
  #   database: my_custom_database
  #   table: application_logs
  #   region: us-west-2
