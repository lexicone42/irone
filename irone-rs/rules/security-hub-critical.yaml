id: detect-security-hub-critical
name: Security Hub Critical Compliance Finding
description: >
  Detects critical severity compliance findings from AWS Security Hub.
  Security Hub maps to OCSF class_uid 2003 (Compliance Finding),
  not 2001 (Security Finding). OCSF severity_id 5 maps to critical.
author: irone contributors
severity: critical
event_class: compliance_finding
limit: 1000
threshold: 1
tags:
  - security-hub
  - findings
mitre_attack:
  - T1190
references:
  - https://attack.mitre.org/techniques/T1190/
  - https://docs.aws.amazon.com/securityhub/latest/userguide/securityhub-findings.html
data_sources:
  - security-hub
filters:
  - field: severity_id
    equals: "5"
