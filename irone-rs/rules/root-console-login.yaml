id: detect-root-console-login
name: Root Account Console Login
description: >
  Detects AWS root account console login events.
  Root account usage should be extremely rare and is a critical security signal.
author: irone contributors
severity: critical
event_class: authentication
limit: 1000
threshold: 1
tags:
  - authentication
  - root-account
mitre_attack:
  - T1078.004
references:
  - https://attack.mitre.org/techniques/T1078/004/
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_root-user.html
data_sources:
  - cloudtrail
filters:
  - field: actor.user.type
    equals: Root
  - field: status
    equals: Success
