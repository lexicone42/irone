id: detect-iam-priv-esc
name: IAM Privilege Escalation
description: >
  Detects IAM policy changes that could indicate privilege escalation.
  Monitors for API calls that attach or create policies on users/roles.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 1
tags:
  - iam
  - privilege-escalation
mitre_attack:
  - T1098
  - T1098.003
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
data_sources:
  - cloudtrail
filters:
  - field: api.operation
    in:
      - AttachUserPolicy
      - AttachRolePolicy
      - PutUserPolicy
      - PutRolePolicy
      - CreatePolicyVersion
      - AttachGroupPolicy
      - PutGroupPolicy
  - field: status
    equals: Success
