id: detect-iam-priv-esc
name: IAM Privilege Escalation
description: >
  Detects IAM policy changes that could indicate privilege escalation.
  Monitors for API calls that attach or create policies on users/roles.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 1
tags:
  - iam
  - privilege-escalation
mitre_attack:
  - T1098
  - T1098.003
references:
  - https://attack.mitre.org/techniques/T1098/
  - https://rhinosecuritylabs.com/aws/aws-privilege-escalation-methods-mitigation/
data_sources:
  - cloudtrail
filters:
  - field: api.operation
    in:
      - AttachUserPolicy
      - AttachRolePolicy
      - PutUserPolicy
      - PutRolePolicy
      - CreatePolicyVersion
      - AttachGroupPolicy
      - PutGroupPolicy
  - field: status
    equals: Success

test_cases:
  - name: triggers on AttachUserPolicy success
    events:
      - api.operation: AttachUserPolicy
        status: Success
    expected:
      triggered: true
      match_count: 1

  - name: does not trigger on non-escalation API call
    events:
      - api.operation: DeleteRole
        status: Success
    expected:
      triggered: false
      match_count: 0

  - name: match_count with mixed events
    events:
      - api.operation: AttachUserPolicy
        status: Success
      - api.operation: ListBuckets
        status: Success
      - api.operation: PutRolePolicy
        status: Success
      - api.operation: AttachUserPolicy
        status: Failure
    expected:
      triggered: true
      match_count: 2
