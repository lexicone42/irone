id: detect-gcp-sa-key-created
name: GCP Service Account Key Created
description: >
  Detects creation of service account keys. Service account keys are
  long-lived credentials that can be used outside GCP — the GCP equivalent
  of AWS access keys. Key creation is a persistence technique: an attacker
  who creates a key maintains access even after their initial entry point
  is revoked. Google recommends workload identity federation over keys.
author: irone contributors
severity: high
event_class: api_activity
limit: 1000
threshold: 1
tags:
  - persistence
  - gcp
  - iam
  - service-account
mitre_attack:
  - T1098.001
references:
  - https://attack.mitre.org/techniques/T1098/001/
  - https://cloud.google.com/iam/docs/best-practices-for-managing-service-account-keys
data_sources:
  - gcp-audit
filters:
  - field: api.operation
    equals: google.iam.admin.v1.CreateServiceAccountKey
  - field: api.service.name
    equals: iam.googleapis.com

test_cases:
  - name: triggers on key creation
    events:
      - api.operation: google.iam.admin.v1.CreateServiceAccountKey
        api.service.name: iam.googleapis.com
    expected:
      triggered: true
      match_count: 1

  - name: does not trigger on service account creation
    events:
      - api.operation: google.iam.admin.v1.CreateServiceAccount
        api.service.name: iam.googleapis.com
    expected:
      triggered: false
      match_count: 0
