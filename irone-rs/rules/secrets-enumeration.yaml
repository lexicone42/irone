id: detect-secrets-enumeration
name: Secrets and Parameter Retrieval
description: >
  Detects retrieval of secret values from AWS Secrets Manager or SSM
  Parameter Store. Focuses on operations that return actual secret content
  (GetSecretValue, GetParameter) rather than listing/describing metadata
  (ListSecrets, DescribeParameters), which are routinely called by AWS
  services like Config and CloudFormation. A threshold of 5 retrieval
  operations distinguishes application-normal access from bulk enumeration.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 5
tags:
  - collection
  - credential-access
  - secrets-manager
  - ssm
mitre_attack:
  - T1552
  - T1552.004
references:
  - https://attack.mitre.org/techniques/T1552/
  - https://attack.mitre.org/techniques/T1552/004/
  - https://docs.aws.amazon.com/secretsmanager/latest/userguide/security-best-practices.html
data_sources:
  - cloudtrail
filters:
  - field: api.operation
    in:
      - GetSecretValue
      - BatchGetSecretValue
      - GetParameter
      - GetParameters
      - GetParametersByPath
  - field: api.service.name
    in:
      - secretsmanager.amazonaws.com
      - ssm.amazonaws.com

test_cases:
  - name: triggers on GetSecretValue from Secrets Manager
    events:
      - api.operation: GetSecretValue
        api.service.name: secretsmanager.amazonaws.com
    expected:
      triggered: true
      threshold_override: 1

  - name: does not trigger on ListSecrets
    events:
      - api.operation: ListSecrets
        api.service.name: secretsmanager.amazonaws.com
    expected:
      triggered: false
      threshold_override: 1

  - name: does not trigger on DescribeParameters
    events:
      - api.operation: DescribeParameters
        api.service.name: ssm.amazonaws.com
    expected:
      triggered: false
      threshold_override: 1
