id: detect-secrets-enumeration
name: Secrets and Parameter Retrieval
description: >
  Detects bulk retrieval of secret values from AWS Secrets Manager or SSM
  Parameter Store by IAM users. Focuses on operations that return actual
  secret content (GetSecretValue, GetParameter) rather than metadata listing.
  Excludes AssumedRole principals (Lambda execution roles, ECS tasks) since
  applications legitimately read their own config secrets on startup.
  A threshold of 10 distinguishes human enumeration from normal app access.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 10
tags:
  - collection
  - credential-access
  - secrets-manager
  - ssm
mitre_attack:
  - T1552
  - T1552.004
references:
  - https://attack.mitre.org/techniques/T1552/
  - https://attack.mitre.org/techniques/T1552/004/
  - https://docs.aws.amazon.com/secretsmanager/latest/userguide/security-best-practices.html
data_sources:
  - cloudtrail
filters:
  - field: api.operation
    in:
      - GetSecretValue
      - BatchGetSecretValue
      - GetParameter
      - GetParameters
      - GetParametersByPath
  - field: api.service.name
    in:
      - secretsmanager.amazonaws.com
      - ssm.amazonaws.com
  - field: actor.user.type
    not_equals: AssumedRole

test_cases:
  - name: triggers on GetSecretValue from Secrets Manager
    events:
      - api.operation: GetSecretValue
        api.service.name: secretsmanager.amazonaws.com
    expected:
      triggered: true
      threshold_override: 1

  - name: does not trigger on ListSecrets
    events:
      - api.operation: ListSecrets
        api.service.name: secretsmanager.amazonaws.com
    expected:
      triggered: false
      threshold_override: 1

  - name: does not trigger on DescribeParameters
    events:
      - api.operation: DescribeParameters
        api.service.name: ssm.amazonaws.com
    expected:
      triggered: false
      threshold_override: 1
