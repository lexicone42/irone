id: detect-secrets-enumeration
name: Secrets and Parameter Enumeration
description: >
  Detects enumeration of secrets from AWS Secrets Manager or SSM Parameter
  Store. Attackers with read access systematically retrieve stored secrets
  (database passwords, API keys, certificates) for lateral movement. A
  threshold of 5 read operations distinguishes application-normal secret
  retrieval from bulk enumeration.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 5
tags:
  - collection
  - credential-access
  - secrets-manager
  - ssm
mitre_attack:
  - T1552
  - T1552.004
references:
  - https://attack.mitre.org/techniques/T1552/
  - https://attack.mitre.org/techniques/T1552/004/
  - https://docs.aws.amazon.com/secretsmanager/latest/userguide/security-best-practices.html
data_sources:
  - cloudtrail
filters:
  - field: api.operation
    in:
      - GetSecretValue
      - BatchGetSecretValue
      - ListSecrets
      - GetParameter
      - GetParameters
      - GetParametersByPath
      - DescribeParameters
  - field: api.service.name
    in:
      - secretsmanager.amazonaws.com
      - ssm.amazonaws.com

test_cases:
  - name: triggers on GetSecretValue from Secrets Manager
    events:
      - api.operation: GetSecretValue
        api.service.name: secretsmanager.amazonaws.com
    expected:
      triggered: true
      threshold_override: 1

  - name: does not trigger on CreateSecret
    events:
      - api.operation: CreateSecret
        api.service.name: secretsmanager.amazonaws.com
    expected:
      triggered: false
      threshold_override: 1
