id: detect-lambda-execution-failure
name: Lambda Execution Failure Spike
description: >
  Detects a spike in failed Lambda function executions. In OCSF, any Lambda
  invocation returning an error (including HTTP 4xx from API Gateway-backed
  functions) is status=Failure. A web Lambda behind API Gateway generates
  routine 401/404 failures from normal traffic, so the threshold is set high
  to catch genuine spikes (runtime crashes, resource exhaustion, DoS) while
  filtering out baseline HTTP error noise.
author: irone contributors
severity: medium
event_class: api_activity
limit: 5000
threshold: 500
tags:
  - lambda
  - availability
  - error-monitoring
mitre_attack:
  - T1499
references:
  - https://attack.mitre.org/techniques/T1499/
data_sources:
  - lambda-execution
filters:
  - field: status
    equals: Failure
