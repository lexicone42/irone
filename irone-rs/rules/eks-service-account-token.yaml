id: detect-eks-sa-token-request
name: EKS Service Account Token Request
description: >
  Detects explicit token requests for Kubernetes service accounts. Since K8s 1.24,
  long-lived SA tokens are no longer auto-mounted — explicit token creation via
  TokenRequest API or secret creation is required. An attacker who creates a
  long-lived token for a privileged service account gains persistent API access
  that survives pod deletion. This is the K8s equivalent of creating IAM access keys.
author: irone contributors
severity: high
event_class: api_activity
limit: 1000
threshold: 1
tags:
  - credential-access
  - persistence
  - kubernetes
  - service-account
  - eks
mitre_attack:
  - T1078.001
  - T1098.001
references:
  - https://microsoft.github.io/Threat-Matrix-for-Kubernetes/techniques/Container%20service%20account/
  - https://kubernetes.io/docs/reference/kubernetes-api/authentication-resources/token-request-v1/
data_sources:
  - eks-audit
filters:
  - field: api.operation
    equals: create
  - field: api.service.name
    equals: eks.amazonaws.com
  - field: resources
    contains: serviceaccounts/token

test_cases:
  - name: triggers on token request
    events:
      - api.operation: create
        api.service.name: eks.amazonaws.com
        resources: serviceaccounts/token
        actor.user.name: attacker@example.com
    expected:
      triggered: true
      match_count: 1

  - name: does not trigger on service account creation
    events:
      - api.operation: create
        api.service.name: eks.amazonaws.com
        resources: serviceaccounts
    expected:
      triggered: false
      match_count: 0
