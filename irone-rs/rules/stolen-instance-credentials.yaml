id: detect-stolen-instance-credentials
name: Stolen Instance Credentials (IMDS)
description: >
  Detects API call failures from EC2 instance role sessions, which may
  indicate stolen IMDS credentials being used outside the expected
  environment. When IMDS credentials are exfiltrated via SSRF and used
  from an external IP, calls often fail due to VPC endpoint policies or
  SCPs that restrict credential usage to the originating instance.
  Scoped to EC2 instance roles only (session name matches i-[0-9a-f]+)
  to avoid false positives from Lambda, ECS, SSO, and other AssumedRole
  principals.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 5
tags:
  - credential-access
  - imds
  - instance-metadata
  - ssrf
mitre_attack:
  - T1552.005
references:
  - https://attack.mitre.org/techniques/T1552/005/
  - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
data_sources:
  - cloudtrail
filters:
  - field: actor.user.type
    equals: AssumedRole
  - field: status
    equals: Failure
  # EC2 instance roles use the instance ID as the session name in the ARN.
  # This excludes Lambda, ECS, SSO, and cross-account roles.
  - field: actor.user.uid
    regex: "i-[0-9a-f]{8,17}$"

test_cases:
  - name: triggers on EC2 instance role failure
    events:
      - actor.user.type: AssumedRole
        actor.user.uid: "arn:aws:sts::123456789012:assumed-role/MyEC2Role/i-0abc123def456789a"
        status: Failure
    expected:
      triggered: true
      threshold_override: 1

  - name: does not trigger on Lambda role failure
    events:
      - actor.user.type: AssumedRole
        actor.user.uid: "arn:aws:sts::123456789012:assumed-role/MyLambdaRole/my-function"
        status: Failure
    expected:
      triggered: false
      threshold_override: 1

  - name: does not trigger on IAMUser failure
    events:
      - actor.user.type: IAMUser
        actor.user.uid: "arn:aws:iam::123456789012:user/admin"
        status: Failure
    expected:
      triggered: false
      threshold_override: 1

  - name: does not trigger on ECS task role failure
    events:
      - actor.user.type: AssumedRole
        actor.user.uid: "arn:aws:sts::123456789012:assumed-role/ecsTaskRole/a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        status: Failure
    expected:
      triggered: false
      threshold_override: 1
