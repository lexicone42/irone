id: detect-stolen-instance-credentials
name: Stolen Instance Credentials (IMDS)
description: >
  Detects API call failures from AssumedRole principals, which may indicate
  stolen instance metadata credentials being used outside the expected EC2
  environment. When IMDS credentials are exfiltrated via SSRF and used from
  an external IP, many calls fail due to VPC endpoint policies or SCPs that
  restrict credential usage to the originating instance. A spike of failures
  from AssumedRole principals is a strong signal of credential theft.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 5
tags:
  - credential-access
  - imds
  - instance-metadata
  - ssrf
mitre_attack:
  - T1552.005
references:
  - https://attack.mitre.org/techniques/T1552/005/
  - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html
data_sources:
  - cloudtrail
filters:
  - field: actor.user.type
    equals: AssumedRole
  - field: status
    equals: Failure

test_cases:
  - name: triggers on AssumedRole failure
    events:
      - actor.user.type: AssumedRole
        status: Failure
    expected:
      triggered: true
      threshold_override: 1

  - name: does not trigger on IAMUser failure
    events:
      - actor.user.type: IAMUser
        status: Failure
    expected:
      triggered: false
      threshold_override: 1
