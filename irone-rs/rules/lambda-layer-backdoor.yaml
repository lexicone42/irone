id: detect-lambda-layer-backdoor
name: Lambda Layer Published or Attached
description: >
  Detects bulk Lambda layer or code modifications that may indicate supply chain
  attack or code injection. An attacker who publishes a malicious layer and
  attaches it to many functions achieves broad persistent access. Normal deploys
  update 4-5 functions; a threshold of 10 catches bulk injection while allowing
  routine CI/CD activity. Also detects direct function code updates.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 10
tags:
  - persistence
  - execution
  - lambda
  - code-injection
mitre_attack:
  - T1546
  - T1059
references:
  - https://attack.mitre.org/techniques/T1546/
  - https://attack.mitre.org/techniques/T1059/
  - https://www.cadosecurity.com/blog/cado-discovers-denonia-the-first-malware-specifically-targeting-lambda
  - https://docs.aws.amazon.com/lambda/latest/dg/chapter-layers.html
data_sources:
  - cloudtrail
filters:
  - field: api.operation
    in:
      - PublishLayerVersion
      - UpdateFunctionConfiguration20150331v2
      - UpdateFunctionConfiguration
      - UpdateFunctionCode20150331v2
      - UpdateFunctionCode
  - field: api.service.name
    equals: lambda.amazonaws.com
  - field: status
    equals: Success

test_cases:
  - name: triggers on PublishLayerVersion
    events:
      - api.operation: PublishLayerVersion
        api.service.name: lambda.amazonaws.com
        status: Success
    expected:
      triggered: true
      threshold_override: 1
      match_count: 1

  - name: triggers on UpdateFunctionConfiguration
    events:
      - api.operation: UpdateFunctionConfiguration
        api.service.name: lambda.amazonaws.com
        status: Success
    expected:
      triggered: true
      threshold_override: 1
      match_count: 1

  - name: triggers on UpdateFunctionCode
    events:
      - api.operation: UpdateFunctionCode
        api.service.name: lambda.amazonaws.com
        status: Success
    expected:
      triggered: true
      threshold_override: 1
      match_count: 1

  - name: does not trigger on GetFunction
    events:
      - api.operation: GetFunction
        api.service.name: lambda.amazonaws.com
        status: Success
    expected:
      triggered: false
      match_count: 0

  - name: does not trigger on failed update
    events:
      - api.operation: UpdateFunctionCode
        api.service.name: lambda.amazonaws.com
        status: Failure
    expected:
      triggered: false
      match_count: 0
