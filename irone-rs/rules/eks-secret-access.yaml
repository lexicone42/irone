id: detect-eks-secret-access
name: EKS Secret Access
description: >
  Detects get/list/watch operations on Kubernetes secrets. K8s secrets store
  service account tokens, TLS certificates, registry credentials, and application
  secrets. Bulk secret access is a credential harvesting technique — an attacker
  with read access to secrets in a namespace can extract every credential and
  pivot to other services. Watch for access patterns crossing namespace boundaries.
author: irone contributors
severity: high
event_class: api_activity
limit: 5000
threshold: 5
tags:
  - credential-access
  - kubernetes
  - secrets
  - eks
mitre_attack:
  - T1552.007
references:
  - https://attack.mitre.org/techniques/T1552/007/
  - https://microsoft.github.io/Threat-Matrix-for-Kubernetes/techniques/List%20K8S%20secrets/
  - https://kubernetes.io/docs/concepts/configuration/secret/
data_sources:
  - eks-audit
filters:
  - field: api.operation
    in:
      - get
      - list
      - watch
  - field: api.service.name
    equals: eks.amazonaws.com
  - field: resources
    contains: secrets

test_cases:
  - name: triggers on bulk secret listing
    events:
      - api.operation: list
        api.service.name: eks.amazonaws.com
        resources: secrets
        actor.user.name: compromised-sa
      - api.operation: list
        api.service.name: eks.amazonaws.com
        resources: secrets
        actor.user.name: compromised-sa
      - api.operation: get
        api.service.name: eks.amazonaws.com
        resources: secrets
        actor.user.name: compromised-sa
      - api.operation: get
        api.service.name: eks.amazonaws.com
        resources: secrets
        actor.user.name: compromised-sa
      - api.operation: get
        api.service.name: eks.amazonaws.com
        resources: secrets
        actor.user.name: compromised-sa
    expected:
      triggered: true
      match_count: 5

  - name: does not trigger on single secret get
    events:
      - api.operation: get
        api.service.name: eks.amazonaws.com
        resources: secrets
    expected:
      triggered: false
      match_count: 1
