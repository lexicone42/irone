id: pb-credential-compromise
name: Credential Compromise Response
description: >
  Automated response for detected credential theft or unauthorized access key usage.
  Executes evidence preservation, credential revocation, and team notification.
  Isolation requires manual approval due to potential service impact.
trigger:
  min_severity: high
  tags:
    - credential-access
    - persistence
  mitre_techniques:
    - T1078
    - T1098
    - T1552
enabled: true
actions:
  - name: Notify security team via PagerDuty
    action_type: notify
    approval: auto
    timeout_seconds: 60
    parameters:
      channel: pagerduty
      severity: high
  - name: Snapshot CloudTrail evidence
    action_type: snapshot_evidence
    approval: auto
    timeout_seconds: 300
    parameters:
      artifact_type: cloudtrail_logs
      retention_days: 90
  - name: Revoke compromised credentials
    action_type: revoke_credentials
    approval: auto
    timeout_seconds: 120
    parameters:
      scope: all_access_keys
  - name: Isolate affected resource
    action_type: isolate_resource
    approval: manual
    timeout_seconds: 3600
    parameters:
      method: security_group_deny_all
