# Pre-commit hooks for iris (Rust + JS)
# Install: prek install
# Run manually: prek run --all-files

repos:
  # File validation and hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]  # Allow !Ref, !Sub, etc. for CloudFormation
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: check-merge-conflict

  # Local hooks
  - repo: local
    hooks:
      # Rust: format check (fast, every commit)
      - id: cargo-fmt
        name: Cargo Format
        entry: bash -c 'cd iris-rs && cargo fmt --check 2>&1'
        language: system
        files: ^iris-rs/.*\.rs$
        pass_filenames: false

      # Rust: clippy lint (moderate, every commit)
      - id: cargo-clippy
        name: Cargo Clippy
        entry: bash -c 'cd iris-rs && cargo clippy --workspace --all-targets -- -D warnings 2>&1'
        language: system
        files: ^iris-rs/
        pass_filenames: false

      # Rust: cargo-deny license/advisory check
      - id: cargo-deny
        name: Cargo Deny (licenses + advisories)
        entry: bash -c 'cd iris-rs && cargo deny check 2>&1'
        language: system
        files: ^iris-rs/
        pass_filenames: false

      # Rust: tests (pre-push only — takes ~30s)
      - id: cargo-test
        name: Cargo Test
        entry: bash -c 'cd iris-rs && cargo test --workspace 2>&1'
        language: system
        files: ^iris-rs/
        pass_filenames: false
        stages: [pre-push]

# Configuration
default_stages: [pre-commit]
fail_fast: false
